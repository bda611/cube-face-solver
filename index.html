<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cube Face Solver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #161513;
    --panel: #211f1c;
    --border: #3a352c;
    --text: #ECE6DD;
    --text-dim: #9c9488;
    --accent: #4A8AF0;
    --success: #5FA86B;
    --error: #f87171;
    --free: #D9B53C;
    --accent-text: #6FA3F2; /* lightened accent for small text directly on panel backgrounds, where the full accent falls short of AA contrast */
  }
  * { box-sizing: border-box; }
  /* Baseline keyboard-focus indicator (WCAG 2.4.7): applies to every
     interactive element so nothing relies solely on a 1px border-color
     shift to show focus. Elements with a more specific :focus rule
     below (e.g. .pattern-input) layer their own treatment on top;
     this is the floor, not the only signal. Only shows for real
     keyboard/assistive-tech focus, not mouse clicks. */
  a:focus-visible, button:focus-visible, input:focus-visible,
  select:focus-visible, textarea:focus-visible, summary:focus-visible,
  [tabindex]:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Plain links had no color rule and fell back to the browser's
     default blue (#0000EE), which only contrasts 1.75:1 against
     --panel (#211f1c) -- well under WCAG AA's 4.5:1 floor for normal
     text. Reuse the existing --accent blue instead, which already
     passes (4.84:1) and keeps link color consistent with the rest of
     the UI's interactive-element color. */
  /* Visually hidden but still announced by screen readers -- used for
     status updates (e.g. plan-run progress) that have an always-visible
     sighted equivalent elsewhere, so we don't show the text twice. */
  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
  a { color: var(--accent); }
  a:visited { color: var(--accent); }
  a:hover { text-decoration-thickness: 2px; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 640px; margin: 0 auto; }
  h1 {
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h1::before {
    content: '';
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 3px;
    background: linear-gradient(135deg, var(--accent) 50%, var(--free) 50%);
    flex-shrink: 0;
  }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin: 0 0 20px; line-height: 1.4; }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .panel h2 {
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 0 0 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .step-num {
    background: var(--accent);
    color: #1a1209;
    width: 20px; height: 20px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    flex-shrink: 0;
  }
  .panel-desc { color: var(--text-dim); font-size: 0.8rem; margin: 0 0 14px; line-height: 1.4; }

  .pattern-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #1c1a17;
    color: var(--text);
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 0.95rem;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }
  .pattern-input:focus:not(:focus-visible) { outline: none; }
  .pattern-input:focus { border-color: var(--accent); }
  .pattern-status { font-size: 0.78rem; margin: 0 0 12px; min-height: 1.2em; line-height: 1.4; }
  .pattern-status.status-ok { color: var(--success); }
  .pattern-status.status-error { color: var(--error); }
  .pattern-status.status-empty { color: var(--text-dim); }
  .pattern-preview {
    display: inline-flex;
    gap: 1px;
    vertical-align: middle;
    margin-right: 8px;
  }
  .pattern-preview .bulk-swatch { width: 12px; height: 12px; border-radius: 1px; }

  .accordion {
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 4px;
    overflow: hidden;
  }
  .accordion summary {
    padding: 10px 12px;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-dim);
    list-style: none;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .accordion summary::-webkit-details-marker { display: none; }
  .accordion summary::before {
    content: '▸';
    display: inline-block;
    transition: transform 0.15s ease;
    font-size: 0.7rem;
  }
  .accordion[open] summary::before { transform: rotate(90deg); }
  .accordion[open] summary { color: var(--text); border-bottom: 1px solid var(--border); }
  .accordion-body { padding: 14px 12px; }
  .section-heading {
    font-size: 1.05rem;
    font-weight: 700;
    margin: 28px 0 12px;
    padding-left: 11px;
    border-left: 3px solid var(--accent);
  }
  .section-heading:first-of-type { margin-top: 0; }
  .section-heading .step-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent-text);
    background: rgba(74, 138, 240, 0.12);
    border: 1px solid rgba(74, 138, 240, 0.35);
    border-radius: 5px;
    padding: 2px 6px;
    margin-right: 8px;
    vertical-align: middle;
    transform: translateY(-1px);
  }

  .panel-desc .prep-steps {
    margin: 0 0 14px;
    padding-left: 22px;
  }
  .panel-desc .prep-steps li {
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .panel-desc .prep-steps li:last-child { margin-bottom: 0; }
  .claude-prompt-box {
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    font-family: 'SF Mono', Consolas, monospace;
    font-size: 0.78rem;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    margin: 6px 0 0;
  }

  .palette {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .swatch {
    width: 38px; height: 38px;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    position: relative;
    transition: transform 0.1s;
    padding: 0;
    font: inherit;
    display: block;
  }
  .swatch:active { transform: scale(0.93); }
  .swatch.selected { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
  .swatch .label {
    position: absolute;
    bottom: -16px; left: 0; right: 0;
    text-align: center;
    font-size: 0.6rem;
    color: var(--text-dim);
  }

  .faces-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 420px;
    margin: 0 auto 8px;
  }
  .face-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .face-label { font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }
  .mini-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    width: 84px;
  }
  .cell {
    width: 26px; height: 26px;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 0;
    display: block;
  }
  .cell.center { cursor: default; opacity: 0.85; }
  button.cell:disabled { cursor: default; }

  .single-face-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    width: 180px;
    margin: 0 auto;
  }
  .single-face-grid .cell { width: 56px; height: 56px; border-radius: 6px; }

  .which-face-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .face-pick-btn {
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #2e2e2e;
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
  }
  .face-pick-btn.active { background: var(--accent); color: #1a1209; border-color: var(--accent); font-weight: 600; }

  button.primary {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #1a1209;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    margin-top: 4px;
  }
  button.primary:disabled { background: #444; color: #888; cursor: not-allowed; }
  button.primary:active:not(:disabled) { transform: scale(0.99); }

  .result-box {
    margin-top: 14px;
    padding: 14px;
    border-radius: 10px;
    background: #1e2a1e;
    border: 1px solid #2d4a2d;
  }
  .result-box.error { background: #2a1e1e; border-color: #4a2d2d; }
  .result-box .status {
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .result-box.error .status { color: var(--error); }
  .result-box:not(.error) .status { color: var(--success); }
  .moves-display {
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 1.05rem;
    line-height: 1.8;
    background: #111;
    padding: 12px;
    border-radius: 8px;
    word-spacing: 4px;
    letter-spacing: 0.5px;
  }
  .move-count {
    color: var(--text-dim);
    font-size: 0.75rem;
    margin-top: 8px;
  }
  .notation-help {
    margin-top: 10px;
    font-size: 0.75rem;
    color: var(--text-dim);
    line-height: 1.5;
  }
  .copy-btn {
    margin-top: 8px;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: #2e2e2e;
    color: var(--text);
    font-size: 0.75rem;
    cursor: pointer;
  }

  .loading-msg {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.9rem;
  }
  .spinner {
    width: 24px; height: 24px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 12px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .reset-link {
    display: block;
    text-align: center;
    color: var(--text-dim);
    font-size: 0.78rem;
    margin-top: 18px;
    cursor: pointer;
    text-decoration: underline;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }

  .cube-counter {
    display: inline-block;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent-text);
    font-size: 0.8rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    margin-bottom: 16px;
  }

  .secondary-btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #2e2e2e;
    color: var(--text);
    font-size: 0.8rem;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .secondary-btn:active { transform: scale(0.98); }

  .bottom-actions {
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .bottom-actions .secondary-btn {
    width: 100%;
    padding: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    background: #182218;
    border-color: #3d5a3d;
    color: var(--success);
    margin-bottom: 0;
  }

  .panel-desc code {
    background: #111;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 0.78rem;
  }

  .bulk-swatch { width: 10px; height: 10px; border-radius: 1px; }
  .bulk-swatch.bulk-center { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4); }

  textarea.pattern-input {
    font-family: 'SF Mono', Consolas, monospace;
    resize: vertical;
    min-height: 84px;
    line-height: 1.5;
  }
  .matcher-row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .matcher-row label { font-size: 0.8rem; color: var(--text-dim); }
  .matcher-row input[type="number"] {
    width: 70px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #1c1a17;
    color: var(--text);
    font-size: 0.9rem;
  }
  .matcher-row input[type="number"]:focus:not(:focus-visible) { outline: none; }
  .matcher-row input[type="number"]:focus { border-color: var(--accent); }
  .match-summary {
    display: flex;
    gap: 10px;
    margin: 10px 0 14px;
    flex-wrap: wrap;
  }
  .match-stat {
    flex: 1;
    min-width: 90px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
  }
  .match-stat .num { font-size: 1.4rem; font-weight: 700; line-height: 1.1; font-family: 'JetBrains Mono', 'SF Mono', monospace; }
  .match-stat .lbl { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; }
  .match-stat.free .num { color: var(--success); }
  .match-stat.remaining .num { color: var(--accent-text); }
  .match-stat:not(.free):not(.remaining) .num { color: var(--free); }
  .match-list { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }
  .match-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 11px;
    border-radius: 8px;
    background: #1e2a1e;
    border: 1px solid #2d4a2d;
    font-size: 0.8rem;
  }
  .match-item .match-badge {
    background: var(--success);
    color: #000;
    font-weight: 700;
    font-size: 0.68rem;
    padding: 2px 7px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .match-item .match-detail { color: var(--text-dim); flex: 1; line-height: 1.4; }
  .match-item .match-detail strong { color: var(--text); font-weight: 600; }
  .pool-tag {
    display: inline-block;
    font-size: 0.68rem;
    padding: 1px 6px;
    border-radius: 4px;
    background: #2b2823;
    color: var(--text-dim);
    margin-left: 4px;
  }
  .match-item.solve-item { background: #1e2430; border-color: #2d3d4a; }
  .match-item .match-badge.badge-solve { background: var(--accent); }

  .source-cards { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .source-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    background: #1c1a17;
  }
  .source-card.active { border-color: var(--accent); background: #1a2030; }
  .source-card .source-card-title {
    font-size: 0.85rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .source-card .source-card-title input[type="radio"] { accent-color: var(--accent); }
  .source-type-options { display: flex; flex-wrap: wrap; gap: 14px; }
  .source-type-option { display: flex; align-items: center; gap: 6px; font-weight: 600; cursor: pointer; }
  .source-type-option input[type="radio"] { accent-color: var(--accent); margin: 0; cursor: pointer; }
  .source-type-option input[type="radio"]:disabled { cursor: not-allowed; }
  .source-type-option:has(input:disabled) { opacity: 0.45; cursor: not-allowed; }
  .source-type-option em { font-style: normal; font-weight: 400; opacity: 0.8; }
  .source-card .source-card-body { margin-top: 8px; padding-left: 24px; }
  .source-card .source-card-body.disabled { opacity: 0.4; pointer-events: none; }

  select.pattern-input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #1c1a17;
    color: var(--text);
    font-size: 0.9rem;
    margin-bottom: 8px;
  }
  select.pattern-input:focus:not(:focus-visible) { outline: none; }
  select.pattern-input:focus { border-color: var(--accent); }

  .plan-summary {
    display: flex;
    gap: 10px;
    margin: 14px 0;
    flex-wrap: wrap;
  }
  .submit-btn-row { display: flex; gap: 8px; }
  .submit-btn-row button.primary { margin-top: 0; }
  .cube-viewer-trigger {
    background: var(--accent);
    color: #1a1209;
    font-weight: 600;
  }
  .cube-viewer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .cube-viewer-modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 480px;
    max-height: 95vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .cube-viewer-modal:focus { outline: none; }
  .cube-viewer-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 16px 10px;
    flex-shrink: 0;
  }
  .cube-viewer-header h3 { margin: 0; font-size: 0.95rem; font-weight: 600; }
  .cube-viewer-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 1.3rem;
    cursor: pointer;
    line-height: 1;
    padding: 4px 8px;
  }
  .cube-viewer-canvas-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    flex-shrink: 0;
    background: #0d0d0d;
    touch-action: none;
  }
  .cube-viewer-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
  .cube-viewer-minimap {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 0 16px 10px;
    flex-shrink: 0;
  }
  .cube-viewer-minimap-closeup {
    display: grid;
    gap: 1px;
    background: #000;
    padding: 3px;
    border-radius: 5px;
    flex-shrink: 0;
  }
  .cube-viewer-minimap-cell {
    width: 18px;
    height: 18px;
    border-radius: 2px;
  }
  .cube-viewer-minimap-cell.current {
    outline: 2px solid var(--accent);
    outline-offset: 1px;
    position: relative;
    z-index: 1;
  }
  .cube-viewer-minimap-cell.empty { background: #1c1a17; }
  .cube-viewer-minimap-thumb-wrap { flex-shrink: 0; }
  .cube-viewer-minimap-thumb {
    position: relative;
    background: #000;
    padding: 3px;
    border-radius: 5px;
    line-height: 0;
  }
  .cube-viewer-minimap-thumb canvas { display: block; }
  .cube-viewer-minimap-marker {
    position: absolute;
    width: 5px;
    height: 5px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6);
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .cube-viewer-minimap-label {
    font-size: 0.65rem;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: center;
  }
  .cube-viewer-step-label {
    text-align: center;
    padding: 10px 16px 4px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .cube-viewer-step-label strong { color: var(--accent-text); font-size: 1.1rem; }
  .cube-viewer-moves-strip {
    display: flex;
    gap: 4px;
    padding: 6px 16px;
    overflow-x: auto;
    flex-shrink: 0;
  }
  .cube-viewer-move-chip {
    flex-shrink: 0;
    font-family: 'SF Mono', Monaco, monospace;
    font-size: 0.85rem;
    padding: 4px 9px;
    border-radius: 6px;
    background: #1c1a17;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .cube-viewer-move-chip.current { background: var(--accent); color: #1a1209; border-color: var(--accent); font-weight: 700; }
  .cube-viewer-move-chip.done { opacity: 0.5; }
  .cube-viewer-controls {
    display: flex;
    gap: 8px;
    padding: 12px 16px 16px;
    flex-shrink: 0;
  }
  .cube-viewer-controls button {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #2e2e2e;
    color: var(--text);
    font-size: 0.85rem;
    cursor: pointer;

// before it can be compared against a state string's cubejs letters --
// they are NOT the same alphabet and must never be compared directly.
const MOSAIC_CODE_TO_CUBE_LETTER = { W: 'U', Y: 'R', R: 'F', O: 'D', B: 'L', G: 'B' };
function inverseMoves(moveStr) {
  if (!moveStr || moveStr.trim() === '') return '';
  return moveStr.trim().split(/\s+/).reverse().map(m => {
    if (m.endsWith("'")) return m[0];
    if (m.endsWith('2')) return m;
    return m + "'";
  }).join(' ');
}

// Collapses adjacent same-face moves (e.g. "R R'" -> nothing, "R R" -> "R2",
// "U2 U" -> "U'") repeatedly until no more simplification is possible.
// Verified equivalence-preserving via extensive random-scramble testing
// during development (applying original vs. simplified always yields the
// identical resulting cube state).
function simplifyMoves(moveStr) {
  let moves = moveStr.trim().split(/\s+/).filter(Boolean);
  let changed = true;
  while (changed) {
    changed = false;
    const result = [];
    for (let i = 0; i < moves.length; i++) {
      if (result.length > 0 && result[result.length - 1][0] === moves[i][0]) {
        const prev = result.pop();
        const prevTurns = prev.length === 1 ? 1 : (prev[1] === '2' ? 2 : 3);
        const curTurns = moves[i].length === 1 ? 1 : (moves[i][1] === '2' ? 2 : 3);
        const total = (prevTurns + curTurns) % 4;
        if (total !== 0) {
          const face = moves[i][0];
          const suffix = total === 1 ? '' : (total === 2 ? '2' : "'");
          result.push(face + suffix);
        }
        changed = true;
      } else {
        result.push(moves[i]);

    }
    moves = result;
  }
  return moves.join(' ');
}

function solveForFace(currentStateStr, targetFace, targetGridLetters) {
  const grid = targetGridLetters.map(row => [...row]);
  grid[1][1] = targetFace; // center is always the face's own color, physically fixed

  const buildResult = buildTargetState(targetFace, grid);
  if (!buildResult.valid) {
    return { success: false, error: buildResult.error || 'Could not construct a valid target arrangement for this pattern.' };
  }

  let currentCube, targetCube;
  try {
    currentCube = Cube.fromString(currentStateStr);
    targetCube = Cube.fromString(buildResult.str);
  } catch (e) {
    return { success: false, error: `Invalid cube state: ${e.message}` };
  }

  let movesA, movesB;
  try {
    movesA = currentCube.solve();
    movesB = targetCube.solve();
  } catch (e) {
    return { success: false, error: `Solver error: ${e.message}` };
  }

  const movesBInverse = inverseMoves(movesB);
  const rawSequence = [movesA, movesBInverse].filter(s => s.trim() !== '').join(' ').trim();
  const fullSequence = simplifyMoves(rawSequence);

  const verifyCube = Cube.fromString(currentStateStr);
  if (fullSequence !== '') verifyCube.move(fullSequence);
  const finalStr = verifyCube.asString();
  const achievedFaceGrid = faceGridFromString(finalStr, targetFace);
  const targetMatches = JSON.stringify(achievedFaceGrid) === JSON.stringify(grid);

  if (!targetMatches) {
    return {
      success: false,
      error: 'Internal verification failed -- the computed moves did not produce the requested pattern. Please try again or report this.',
    };
  }

  return {
    success: true,
    moves: fullSequence === '' ? '(already matches -- no moves needed)' : fullSequence,
    moveCount: fullSequence === '' ? 0 : fullSequence.split(/\s+/).length,
    finalStr, // the verified real resulting 6-face state, for chaining into a future mosaic
  };
}
const FACE_LETTERS = new Set(['U', 'R', 'F', 'D', 'L', 'B']);
function parseStartingStateInput(text) {
  const raw = text.trim();
  if (raw === '') return null;
  const cleaned = raw.toUpperCase().replace(/\s/g, '');
  if (cleaned.length !== 54) {
    return { str: null, error: `Expected 54 letters, got ${cleaned.length}.` };
  }
  const invalidChar = [...cleaned].find(ch => !FACE_LETTERS.has(ch));
  if (invalidChar) {
    return { str: null, error: `Unrecognized letter "${invalidChar}". Use only U, R, F, D, L, B.` };
  }
  // Cube.fromString doesn't check that each color appears exactly 9
  // times (a real cube always has exactly 9 of each), so a corrupted
  // or hand-edited string could otherwise be silently accepted as
  // "valid" while describing a cube that doesn't physically exist.
  const counts = {};
  for (const ch of cleaned) counts[ch] = (counts[ch] || 0) + 1;
  const badCounts = Object.entries(counts).filter(([, n]) => n !== 9);
  if (badCounts.length > 0 || Object.keys(counts).length !== 6) {
    const detail = Object.keys(counts).map(k => `${k}:${counts[k]}`).join(', ');
    return { str: null, error: `Each of the 6 letters must appear exactly 9 times (got ${detail}).` };
  }
  // Validate it's actually a legal, solvable cube state before accepting it --
  // catches typos/corruption rather than handing the solver something that
  // could hang (see Cube.fromString / .solve()).
  try {
    const testCube = Cube.fromString(cleaned);
    testCube.solve(); // throws if unsolvable; result discarded, this is just a validity check
  } catch (e) {
    return { str: null, error: `Not a valid/solvable cube state: ${e.message}` };
  }
  return { str: cleaned, error: null };
}

// =====================================================================
// State
// =====================================================================

let appState = {
  solverReady: false,

  // --- Pattern mode: whole mosaic, bulk text entry ---
  // (This used to be one of two top-level modes; the old one-cube-at-
  // a-time "Paint" mode was removed since it doesn't fit a real mosaic
  // workflow of hundreds of cubes. Pattern mode is the only mode now.)
  // Starting state is built from a STACKABLE list of source rows for
  // any cubes that AREN'T starting solved -- e.g. leftovers from the
  // Cat Mosaic export, plus another pasted batch. Each row is
  // independently typed ('lastExport' / 'paste' / 'solved') and
  // configured; buildStartingPool() below concatenates all rows into
  // one pool. The very first row defaults to 'solved' here, but that
  // default gets upgraded to 'lastExport' on first render if any saved
  // exports already exist -- see patternStartRowsDefaultApplied below.
  patternStartRows: [{ id: 1, type: 'solved', exportName: null, pasteText: '' }],
  patternStartRowNextId: 2,
  // Tracks whether we've already picked the initial row's default
  // type based on saved-export availability. Only happens once, the
  // first time the panel renders -- after that, the row's type is the
  // user's own choice and must never be silently overwritten again.
  patternStartRowsDefaultApplied: false,
  // Target mosaic -- always bulk text in pattern mode.
  patternTargetInput: '', // raw textarea, one 9-letter W/Y/R/O/B/G line per cube
  // Optional: how many cubes wide the mosaic is, purely for the visual
  // grid preview and for showing each placement's row/column instead
  // of just a flat line number. Null/empty means "unknown" -- the tool
  // still works fine without it, just shows a flat list instead of a grid.
  patternMosaicWidth: null,
  // Optional: how many cubes this mosaic SHOULD have, entered once up
  // front (e.g. from the source PDF/instructions) purely as a sanity
  // check against what actually got pasted into patternTargetInput.
  // Null/empty means "not checking" -- the tool works fine without it,
  // it just can't catch a miscount for you. This is deliberately
  // SEPARATE from patternMosaicWidth: width is about shape (for the
  // preview grid), this is about total count (a wrong line count
  // silently shifts every row/column mapping after it, so it's worth
  // a dedicated check independent of whether width is even set).
  patternExpectedCount: null,
  // Set true once the user has clicked through the mismatch-confirm
  // dialog for the CURRENT mismatched input, so re-renders triggered by
  // unrelated state changes (e.g. typing in a starting-pool row) don't
  // re-ask. Reset to false any time the target text or expected count
  // changes, since a "yes, submit anyway" for one mismatch shouldn't
  // silently cover a different, later mismatch.
  patternCountMismatchAcked: false,
  // Optional row-range filter for the plan results list, so you can
  // narrow hundreds of placements down to just the physical section
  // of the mosaic you're currently working through. { from, to } | null.
  patternPlanRowFilter: null,
  // The current/last plan RUN. Unlike a single one-shot return value,
  // this is a mutable, incrementally-built, PERSISTABLE object: large
  // mosaics (hundreds of cubes) take real time to solve, so the run
  // happens in small chunks (see runPlanChunk) with progress updates
  // between chunks rather than freezing the page, and the in-progress
  // state is saved to localStorage after every chunk so a reload mid-
  // mosaic can resume from the last completed target instead of
  // starting over. status: 'idle' | 'running' | 'done' | 'cancelled'.
  patternPlanState: null,

  // --- Shared session record ---
  // Every REAL solve this session gets its verified resulting 54-char
  // state recorded here -- the only physically correct way to know a
  // cube's state after solving it. Exportable, and also offered as a
  // future mosaic's "last export" pool.
  solveLog: [], // { source: 'pattern', label, resultStr }[]
};

// =====================================================================
// Saved exports (localStorage) -- lets pattern mode's "Use last
// mosaic's pattern" option list real past exports without the user
// re-uploading a file. This is a plain local browser file (opened via
// file://, per the user), so localStorage persists across sessions on
// the same machine/browser. We also still offer a plain .txt download
// for backup/portability -- localStorage is just the convenient default.
// =====================================================================

const EXPORTS_STORAGE_KEY = 'cubeFaceSolver.savedExports';
const PLAN_RUN_STORAGE_KEY = 'cubeFaceSolver.inProgressPlanRun';

// Persists the in-progress plan run after every chunk, so a reload or
// crash mid-mosaic (hundreds of cubes can take real time) can resume
// from the last completed target instead of losing all progress.
// Cleared once the run finishes, is cancelled, or a new run starts.
function savePlanRunProgress(planState) {
  try {
    localStorage.setItem(PLAN_RUN_STORAGE_KEY, JSON.stringify(planState));
    return true;
  } catch (e) {
    return false; // storage unavailable/full -- resume just won't be offered; the run itself still completes
  }
}
function loadPlanRunProgress() {
  try {
    const raw = localStorage.getItem(PLAN_RUN_STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) {
    return null;
  }
}
function clearPlanRunProgress() {
  try { localStorage.removeItem(PLAN_RUN_STORAGE_KEY); } catch (e) { /* ignore */ }
}


function loadSavedExports() {
  try {
    const raw = localStorage.getItem(EXPORTS_STORAGE_KEY);
    if (!raw) return [];
    const parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed : [];
  } catch (e) {
    return []; // corrupted storage or unavailable (e.g. some strict privacy modes) -- fail soft
  }
}

function saveSavedExports(list) {
  try {
    localStorage.setItem(EXPORTS_STORAGE_KEY, JSON.stringify(list));
    return true;
  } catch (e) {
    return false;
  }
}

// Saves the CURRENT solveLog as a named export entry (most recent
// first), so it becomes selectable as a future mosaic's starting pool.
function saveCurrentLogAsExport(name) {
  const list = loadSavedExports();
  // Auto-suffix on a name collision rather than silently creating two
  // indistinguishable entries in the picker (a real trap: you'd have
  // no way to tell which "Cat Mosaic" is which without opening each).
  let finalName = name;
  let suffix = 2;
  while (list.some(e => e.name === finalName)) {
    finalName = `${name} (${suffix})`;
    suffix++;
  }
  const lines = appState.solveLog.map(e => e.resultStr);
  list.unshift({ name: finalName, savedAt: new Date().toISOString(), lines });
  saveSavedExports(list.slice(0, 50)); // cap so storage can't grow unbounded
  return finalName;
}

// =====================================================================
// Shared color helpers
// =====================================================================

const VALID_CODES = new Set(PALETTE.map(p => p.code));

function paletteIdToHex(id) {
  const p = PALETTE.find(p => p.id === id);
  return p ? p.hex : '#444';
}

// =====================================================================
// Pattern mode: whole-mosaic planning
// =====================================================================

// The ONE fixed color<->letter convention this whole tool uses for any
// state string: cubejs letter U/R/F/D/L/B maps to mosaic color
// White/Yellow/Red/Orange/Blue/Green (see MOSAIC_CODE_TO_CUBE_LETTER
// above). Every 54-char state string pattern mode touches (a fresh
// solved cube, a pasted export line, a verified solve result) is built
// under this same convention, so it's always safe to translate a
// mosaic-color target pattern through this fixed map before comparing
// or solving -- the two letter alphabets are never compared directly.

const CUBE_LETTER_TO_MOSAIC_CODE = {};
Object.entries(MOSAIC_CODE_TO_CUBE_LETTER).forEach(([mosaic, cube]) => { CUBE_LETTER_TO_MOSAIC_CODE[cube] = mosaic; });

function solvedStateString() {
  return FACE_ORDER.map(f => f.repeat(9)).join('');
}

// Parses the bulk "this mosaic's targets" textarea: one 9-letter
// W/Y/R/O/B/G pattern per line, in mosaic order. Blank lines are
// skipped (so pasting with spacing/groupings from a PDF conversion
// doesn't break). Returns { targets, errors }, where each target is
// { lineNum, mosaicPattern, cubeGrid } -- mosaicPattern keeps the
// original W/Y/R/O/B/G letters (for display and for allFaceOrientations
// comparisons against pool cubes), cubeGrid is the SAME 9 cells as a
// 3x3 array of cubejs U/R/F/D/L/B letters (what solveForFace needs).
function parseMosaicTargets(text) {
  const lines = text.split('\n');
  const targets = [];
  const errors = [];
  lines.forEach((line, idx) => {
    const raw = line.trim();
    if (raw === '') return;
    const cleaned = raw.toUpperCase().replace(/[\s,]/g, '');
    if (cleaned.length !== 9) {
      errors.push(`Line ${idx + 1}: expected 9 letters, got ${cleaned.length} ("${raw}").`);
      return;
    }
    const invalidChar = [...cleaned].find(ch => !VALID_CODES.has(ch));
    if (invalidChar) {
      errors.push(`Line ${idx + 1}: unrecognized letter "${invalidChar}". Use only W, Y, R, O, B, G.`);
      return;
    }
    const cubeLetters = [...cleaned].map(ch => MOSAIC_CODE_TO_CUBE_LETTER[ch]);
    const cubeGrid = [cubeLetters.slice(0, 3), cubeLetters.slice(3, 6), cubeLetters.slice(6, 9)];
    const cubePattern = cubeLetters.join(''); // flat cubejs-letter string, for comparing against allFaceOrientations output (which is ALSO cubejs letters -- never compare mosaicPattern against that directly)
    targets.push({ lineNum: idx + 1, mosaicPattern: cleaned, cubeGrid, cubePattern });
  });
  return { targets, errors };
}

// Parses the bulk starting-pool textarea: one 54-letter cubejs state
// per line. Reuses the same strict validator as a single-state input
// (exact counts of 9, and a real solvable state) since a corrupted
// line here would otherwise silently produce a wrong plan.
function parseMosaicPool(text) {
  const lines = text.split('\n');
  const pool = [];
  const errors = [];
  lines.forEach((line, idx) => {
    const raw = line.trim();
    if (raw === '') return;
    const parsed = parseStartingStateInput(raw);
    if (!parsed || !parsed.str) {
      errors.push(`Pool line ${idx + 1}: ${parsed ? parsed.error : 'empty'}`);
      return;
    }
    pool.push({ lineNum: idx + 1, str: parsed.str, label: `pasted line ${idx + 1}` });
  });
  return { pool, errors };
}

// Builds one row's pool fragment, by its type ('lastExport' or
// 'paste' -- 'solved' is NOT a row type: solved cubes are an
// AUTOMATIC fallback, not something you configure, see planMosaic
// below). Each fragment's entries carry a label identifying which
// row/source they came from, so the final plan can show e.g. "from
// Cat Mosaic export" vs "fresh solved cube" side by side, even though
// matching treats them identically.
function buildPoolForRow(row) {
  if (row.type === 'lastExport') {
    if (!row.exportName) return { pool: [], errors: [] }; // not chosen yet -- not an error, just nothing to add
    const exportsList = loadSavedExports();
    const entry = exportsList.find(e => e.name === row.exportName);
    if (!entry) return { pool: [], errors: [`Saved export "${row.exportName}" could not be found.`] };
    const pool = [];
    const errors = [];
    entry.lines.forEach((line, idx) => {
      const parsed = parseStartingStateInput(line);
      if (!parsed || !parsed.str) {
        errors.push(`Export "${entry.name}" line ${idx + 1}: ${parsed ? parsed.error : 'empty'}`);
        return;
      }
      pool.push({ str: parsed.str, label: `"${entry.name}" line ${idx + 1}` });
    });
    return { pool, errors };
  }
  if (row.type === 'paste') {
    const { pool, errors } = parseMosaicPool(row.pasteText);
    return { pool: pool.map(p => ({ str: p.str, label: p.label })), errors };
  }
  return { pool: [], errors: [] };
}

// Builds the FULL starting pool by concatenating every configured
// row, in row order. Row order only affects which row's label a
// given cube displays under in the result -- it never affects WHICH
// matches are found, since the free-match pass checks every pool
// cube against every remaining target regardless of source.
// Lightweight count label shown under a paste-type starting-pool row
// (e.g. "12 cubes parsed", or an error count if some lines didn't
// parse). This is informational only -- unlike the target mosaic's
// expected-count check, there's no confirm-gate here and no "expected"
// field to compare against, since a starting-pool miscount is low
// stakes (the planner auto-fills any shortfall with fresh solved
// cubes, and a surplus just leaves a few pool cubes unused).
function rowPasteCountLabel(row) {
  if (row.pasteText.trim() === '') return 'No cubes pasted yet.';
  const { pool, errors } = parseMosaicPool(row.pasteText);
  if (errors.length > 0) {
    return `${pool.length} cube${pool.length === 1 ? '' : 's'} parsed, ${errors.length} line${errors.length === 1 ? '' : 's'} couldn't be read -- see errors after submitting.`;
  }
  return `${pool.length} cube${pool.length === 1 ? '' : 's'} parsed.`;
}

function buildStartingPool() {
  const pool = [];
  const errors = [];
  for (const row of appState.patternStartRows) {
    const frag = buildPoolForRow(row);
    pool.push(...frag.pool);
    errors.push(...frag.errors);
  }
  return { pool, errors };
}

// Runs the FREE-MATCH pass: for each pool cube (in order), check every
// remaining unmatched target's mosaicPattern against all 24 of that
// cube's face/rotation orientations; on the first hit, claim it for
// that target (zero moves). This is a simple greedy match -- only
// EXACT matches count as free; nothing here estimates "close" matches,
// since that would require solving every pool-target pair anyway (see
// design discussion -- there's no cheap shortcut, only a full search,
// which is what the SOLVE pass below does one target at a time).
function runFreeMatchPass(targets, pool) {
  const matchedTargetIdx = new Set();
  const matchedPoolIdx = new Set();
  const freeMatches = [];

  // Iterate a FIXED snapshot of pool entries (by original index) so
  // mutation never happens mid-loop -- a prior version spliced
  // remainingPool while iterating over it, which skipped entries and
  // silently produced wrong (too few) matches.
  for (let pi = 0; pi < pool.length; pi++) {
    const entry = pool[pi];
    const orientations = allFaceOrientations(entry.str);
    let hitTi = -1, hitOrientation = null;
    for (let ti = 0; ti < targets.length; ti++) {
      if (matchedTargetIdx.has(ti)) continue; // already claimed by an earlier pool cube
      const target = targets[ti];
      const hit = orientations.find(o => o.pattern === target.cubePattern);
      if (hit) { hitTi = ti; hitOrientation = hit; break; }
    }
    if (hitTi !== -1) {
      matchedTargetIdx.add(hitTi);
      matchedPoolIdx.add(pi);
      freeMatches.push({ target: targets[hitTi], pool: entry, orientation: hitOrientation });
    }
  }

  const remainingTargets = targets.filter((_, ti) => !matchedTargetIdx.has(ti));
  const remainingPool = pool.filter((_, pi) => !matchedPoolIdx.has(pi));

  return { freeMatches, remainingTargets, remainingPool };
}

// The full mosaic planner: free-match pass first, then a real solve
// for every remaining target using the next available pool cube (or a
// fresh solved cube once the pool runs out). Always solves toward
// face 'F' -- in pattern mode no face choice is exposed to the user,
// and any face works equally well since the mosaic doesn't care which
// physical face you end up calling "front" once the cube is oriented
// and placed.
// Phase 1 (cheap, synchronous): parse targets, build the starting
// pool (including the automatic solved-cube top-up), and run the
// free-match pass. This is fast even for hundreds of targets -- it's
// pure string comparisons, no actual cube-solving -- so it never needs
// chunking. Returns a planState object ready for runPlanChunk to
// process the remaining (non-free) targets incrementally.
function initPlanRun(targetsInput) {
  const { targets, errors: targetErrors } = parseMosaicTargets(targetsInput);
  const { pool: configuredPool, errors: poolErrors } = buildStartingPool();
  const errors = [...targetErrors, ...poolErrors];

  // Solved cubes are never something you configure a count for -- they
  // are an AUTOMATIC fallback that fills whatever gap is left between
  // your configured rows (saved exports / pasted states) and the total
  // number of targets. Topping the pool up BEFORE the free-match pass
  // (rather than only at the solve stage) means a solved cube is also
  // eligible to free-match a target -- e.g. an all-White target will
  // happily claim a topped-up solved cube for free, not just leftover
  // configured-row cubes.
  const shortfall = Math.max(0, targets.length - configuredPool.length);
  const pool = configuredPool.concat(
    Array.from({ length: shortfall }, () => ({ str: solvedStateString(), label: 'fresh solved cube' }))
  );

  const { freeMatches, remainingTargets, remainingPool } = runFreeMatchPass(targets, pool);

  const placements = freeMatches.map(m => ({
    targetLineNum: m.target.lineNum,
    mosaicPattern: m.target.mosaicPattern,
    type: 'free',
    sourceLabel: m.pool.label,
    face: m.orientation.face,
    rotation: m.orientation.rotation * 90,
    moves: '(already matches -- no moves needed)',
    moveCount: 0,
    startStr: m.pool.str, // cube's state before any moves -- identical to finalStr here since a free match makes none; kept so the 3D animation always has a defined starting point regardless of placement type
    finalStr: m.pool.str,
    placed: false, // whether the PHYSICAL cube has actually been put in place yet -- separate from whether the plan has calculated it
  }));

  return {
    status: remainingTargets.length === 0 ? 'done' : 'running',
    targetsInput, // kept so a resumed/reloaded run can be displayed/verified against its own source text
    mosaicWidth: appState.patternMosaicWidth, // captured AT SUBMIT TIME so a reload/resume keeps showing row/col labels and the same grid shape, instead of losing them because the width field itself wasn't separately persisted
    totalCount: targets.length,
    doneCount: placements.length,
    placements,
    errors,
    solveQueue: remainingTargets, // targets still needing a real solve
    poolQueue: remainingPool, // pool cubes not yet consumed by a solve
    leftoverPoolCount: 0, // finalized once solveQueue is empty
  };
}

// Phase 2 (chunked): processes up to `chunkSize` real solves from
// planState.solveQueue, mutating placements/errors/poolQueue/doneCount
// in place. Returns the SAME planState for convenience. Designed to be
// called repeatedly (e.g. once per setTimeout tick) so the UI can
// render progress and stay responsive between chunks, and so a
// cancel/reload can stop or resume cleanly between chunks rather than
// only at the very end.
// IMPORTANT: a cube's center sticker is physically fixed to its own
// face -- you cannot choose an arbitrary center color for whichever
// face ends up displaying the pattern. So the target face to solve
// toward is NOT a free choice; it's dictated by the target pattern's
// OWN center cell (already translated to a cubejs letter in cubeGrid).
//
// PERFORMANCE NOTE: real mosaics very commonly have large repeated
// regions (solid-color backgrounds, sky, etc.) -- many target lines
// end up identical, and whenever the pool is exhausted, every one of
// those identical targets starts from the SAME fresh solved cube too.
// solveForFace is a pure function of (source state, target face,
// target grid), so solving the exact same (state, face, grid) twice
// always produces the exact same answer -- recomputing it is wasted
// work, not a different/more-correct answer. A per-run cache (cleared
// whenever a new plan starts, since it lives on planState itself)
// skips that waste: measured ~280x faster for 300 identical solves in
// testing, with the cached result being byte-for-byte the same as an
// uncached one would be.
function solveForFaceCacheKey(sourceStr, targetFace, cubeGrid) {
  return sourceStr + '|' + targetFace + '|' + cubeGrid.flat().join('');
}

function runPlanChunk(planState, chunkSize) {
  // solveCache doesn't survive JSON serialization (a Map round-trips
  // through JSON.stringify/parse as a plain {} object, which lacks
  // .get/.set) -- so after a resume from localStorage, re-create it as
  // a real Map rather than just checking truthiness, or the very first
  // cache .get() call after a resume would throw.
  if (!(planState.solveCache instanceof Map)) planState.solveCache = new Map();
  const n = Math.min(chunkSize, planState.solveQueue.length);
  for (let i = 0; i < n; i++) {
    const target = planState.solveQueue.shift();
    const sourceEntry = planState.poolQueue.length > 0 ? planState.poolQueue.shift() : { str: solvedStateString(), label: 'fresh solved cube' };
    const targetFace = target.cubeGrid[1][1];
    const cacheKey = solveForFaceCacheKey(sourceEntry.str, targetFace, target.cubeGrid);
    let result = planState.solveCache.get(cacheKey);
    if (!result) {
      try {
        result = solveForFace(sourceEntry.str, targetFace, target.cubeGrid);
      } catch (e) {
        result = { success: false, error: `Unexpected error: ${e.message}` };
      }
      planState.solveCache.set(cacheKey, result);
    }
    if (result.success) {
      planState.placements.push({
        targetLineNum: target.lineNum,
        mosaicPattern: target.mosaicPattern,
        type: 'solve',
        sourceLabel: sourceEntry.label,
        face: targetFace,
        rotation: 0,
        moves: result.moves,
        moveCount: result.moveCount,
        startStr: sourceEntry.str, // cube's state BEFORE these moves, for the 3D animation to start from
        finalStr: result.finalStr,
        placed: false,
      });
    } else {
      planState.errors.push(`Target line ${target.lineNum} (${target.mosaicPattern}): ${result.error}`);
    }
    planState.doneCount++;
  }

  if (planState.solveQueue.length === 0) {
    planState.status = planState.status === 'cancelled' ? 'cancelled' : 'done';
    planState.leftoverPoolCount = planState.poolQueue.length;
    planState.placements.sort((a, b) => (a.targetLineNum ?? Infinity) - (b.targetLineNum ?? Infinity));
  }

  return planState;
}

  // ── PDF IMPORT ──────────────────────────────────────────────────────────────
  // Reads a Ruwix mosaic instruction PDF, samples cell colors on each page,
  // and populates the target textarea + width/count fields automatically.
  (function initPdfImport() {
    const dropZone   = document.getElementById('pdfDropZone');
    const fileInput  = document.getElementById('pdfFileInput');
    const pickBtn    = document.getElementById('pdfPickBtn');
    const statusEl   = document.getElementById('pdfImportStatus');
    const progressEl = document.getElementById('pdfImportProgress');
    const progressBar   = document.getElementById('pdfProgressBar');
    const progressLabel = document.getElementById('pdfProgressLabel');
    if (!dropZone || !fileInput) return;

    // Wire pick button and drop zone
    pickBtn.onclick = () => fileInput.click();
    dropZone.onclick = (e) => { if (e.target !== pickBtn) fileInput.click(); };
    fileInput.onchange = (e) => { if (e.target.files[0]) handlePdfFile(e.target.files[0]); };

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = 'var(--accent)';
      dropZone.style.background = 'rgba(74,138,240,0.07)';
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.style.borderColor = '';
      dropZone.style.background = '';
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.borderColor = '';
      dropZone.style.background = '';
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') handlePdfFile(file);
      else showStatus('Please drop a PDF file.', 'error');
    });

    function showStatus(msg, type) {
      statusEl.style.display = 'block';
      statusEl.style.color = type === 'error' ? 'var(--error)' : type === 'success' ? 'var(--success)' : 'var(--text-dim)';
      statusEl.textContent = msg;
    }
    function setProgress(pct, label) {
      progressEl.style.display = 'block';
      progressBar.style.width = pct + '%';
      progressLabel.textContent = label;
    }
    function hideProgress() { progressEl.style.display = 'none'; }

    // ── Color classification ─────────────────────────────────────────────────
    // Ruwix palette RGB values (approximate midpoints for each color)
    const RUWIX_COLORS = [
      { code: 'W', r: 255, g: 255, b: 255 },
      { code: 'Y', r: 255, g: 213, b:   0 },
      { code: 'R', r: 183, g:  18, b:  52 },
      { code: 'O', r: 255, g:  88, b:   0 },
      { code: 'B', r:   0, g:  70, b: 173 },
      { code: 'G', r:   0, g: 155, b:  72 },
    ];

    function classifyColor(r, g, b) {
      let best = null, bestDist = Infinity;
      for (const c of RUWIX_COLORS) {
        const d = (r - c.r) ** 2 + (g - c.g) ** 2 + (b - c.b) ** 2;
        if (d < bestDist) { bestDist = d; best = c.code; }
      }
      return best;
    }

    // ── Grid detection and cell sampling ────────────────────────────────────
    // Ruwix PDFs render a thick black border around the entire grid block,
    // with gray dividers between individual 3x3 cube grids.
    // Strategy: scan the canvas for the bounding box of the colored region
    // (non-white, non-near-black), then divide into the known grid structure.

    function findGridBounds(imageData, w, h) {
      const d = imageData.data;
      let minX = w, maxX = 0, minY = h, maxY = 0;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const r = d[i], g = d[i+1], b = d[i+2];
          // Skip near-white (background) and near-black (borders/text)
          const isBackground = r > 220 && g > 220 && b > 220;
          const isBorder = r < 60 && g < 60 && b < 60;
          if (!isBackground && !isBorder) {
            if (x < minX) minX = x;
            if (x > maxX) maxX = x;
            if (y < minY) minY = y;
            if (y > maxY) maxY = y;
          }
        }
      }
      return (maxX > minX && maxY > minY) ? { minX, maxX, minY, maxY } : null;
    }

    // Sample the color at the center of a cell, averaging a small patch
    function sampleCell(imageData, w, cx, cy, patchRadius) {
      const d = imageData.data;
      const r = patchRadius || 4;
      let rSum = 0, gSum = 0, bSum = 0, count = 0;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          const px = Math.round(cx + dx);
          const py = Math.round(cy + dy);
          if (px < 0 || py < 0 || px >= w || py >= imageData.height) continue;
          const i = (py * w + px) * 4;
          rSum += d[i]; gSum += d[i+1]; bSum += d[i+2];
          count++;
        }
      }
      if (!count) return 'W';
      return classifyColor(Math.round(rSum/count), Math.round(gSum/count), Math.round(bSum/count));
    }

    // Extract cube patterns from one rendered canvas page.
    // cubesWide: number of cube-columns on this page (always 3 for Ruwix)
    // cubesTall: number of cube-rows on this page (1 for row-1 pages, 4 for others)
    function extractPageCubes(canvas, cubesWide, cubesTall) {
      const ctx = canvas.getContext('2d');
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      imageData.height = canvas.height; // attach for sampleCell
      const bounds = findGridBounds(imageData, canvas.width, canvas.height);
      if (!bounds) return null;

      const { minX, maxX, minY, maxY } = bounds;
      const gridW = maxX - minX;
      const gridH = maxY - minY;

      // Each cube is 3 cells wide × 3 cells tall
      const cellW = gridW / (cubesWide * 3);
      const cellH = gridH / (cubesTall * 3);
      const patchR = Math.max(2, Math.floor(Math.min(cellW, cellH) * 0.25));

      const cubes = [];
      for (let cubeRow = 0; cubeRow < cubesTall; cubeRow++) {
        for (let cubeCol = 0; cubeCol < cubesWide; cubeCol++) {
          let pattern = '';
          for (let cellRow = 0; cellRow < 3; cellRow++) {
            for (let cellCol = 0; cellCol < 3; cellCol++) {
              const cx = minX + (cubeCol * 3 + cellCol + 0.5) * cellW;
              const cy = minY + (cubeRow * 3 + cellRow + 0.5) * cellH;
              pattern += sampleCell(imageData, canvas.width, cx, cy, patchR);
            }
          }
          cubes.push(pattern);
        }
      }
      return cubes;
    }

    // ── Main import handler ──────────────────────────────────────────────────
    async function handlePdfFile(file) {
      // Check PDF.js is loaded
      if (typeof pdfjsLib === 'undefined') {
        showStatus('PDF library not loaded. Check your internet connection and try reloading the page.', 'error');
        return;
      }
      // workerSrc is configured at page load; disableWorker is set on getDocument call

      showStatus('Reading PDF…', 'info');
      setProgress(0, 'Loading…');
      hideProgress();
      setProgress(0, 'Loading PDF…');

      let pdf;
      try {
        const arrayBuffer = await file.arrayBuffer();
        pdf = await pdfjsLib.getDocument({ data: arrayBuffer, disableWorker: true }).promise;
      } catch (e) {
        showStatus('Could not read PDF: ' + e.message, 'error');
        hideProgress();
        return;
      }

      const totalPages = pdf.numPages;
      // Page 1 is the overview/legend page — skip it.
      // Pages 2 onward are the cube pages.
      // Page 2 = row 1 pages start. We need to figure out the mosaic structure.
      // Ruwix PDFs: page 1 = overview. Pages 2..N = cube instruction pages.
      // Each cube page has 3 cubes wide. Row-1 pages have 1 cube tall, others have 4.
      // We detect cubesTall by checking the aspect ratio of the grid on the page.

      const allCubes = [];
      const pageResults = []; // per-page {cubes, cubesTall} for mosaic-row reorganization
      let mosaicWidth = null;
      let cubesPerRowPage = 3; // always 3 for Ruwix

      const offscreenCanvas = document.createElement('canvas');

      for (let pageNum = 2; pageNum <= totalPages; pageNum++) {
        try {
          const page = await pdf.getPage(pageNum);
          const scale = 2.0; // render at 2x for better color accuracy
          const viewport = page.getViewport({ scale });
          offscreenCanvas.width = viewport.width;
          offscreenCanvas.height = viewport.height;
          const ctx = offscreenCanvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, viewport.width, viewport.height);
          await page.render({ canvasContext: ctx, viewport }).promise;

          // Detect cubesTall: check grid aspect ratio vs known cell structure
          // A 3-wide × 1-tall grid has aspect ≈ 3:1; 3-wide × 4-tall ≈ 3:4
          const imageData = ctx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
          imageData.height = offscreenCanvas.height;
          const bounds = findGridBounds(imageData, offscreenCanvas.width, offscreenCanvas.height);
          let cubesTall = 4; // default
          // Signal 1: page aspect ratio (reliable when PDF uses variable page heights)
          const pageRatio = offscreenCanvas.height / offscreenCanvas.width;
          if (pageRatio < 0.5) {
            cubesTall = 1;
          } else if (bounds) {
            // Signal 2: find grid height using rows with significant colored content.
            // findGridBounds maxY is inflated by sparse labels below the grid on 1-tall
            // pages, so measure using rows that have ≥30% of the page's peak colored-
            // pixel count (adaptive — handles any mix of white vs. colored faces).
            const W = offscreenCanvas.width, H = offscreenCanvas.height;
            const d = imageData.data;
            let maxRow = 0;
            const rowCnts = new Int32Array(H);
            for (let y = 0; y < H; y++) {
              let cnt = 0;
              for (let x = 0; x < W; x++) {
                const idx = (y * W + x) * 4;
                const r = d[idx], g = d[idx + 1], b = d[idx + 2];
                if (!(r > 220 && g > 220 && b > 220) && !(r < 60 && g < 60 && b < 60)) cnt++;
              }
              rowCnts[y] = cnt;
              if (cnt > maxRow) maxRow = cnt;
            }
            const gridW = bounds.maxX - bounds.minX;
            let gridH = bounds.maxY - bounds.minY;
            if (maxRow > 0) {
              const thr = maxRow * 0.30;
              let dMinY = H, dMaxY = 0;
              for (let y = 0; y < H; y++) {
                if (rowCnts[y] >= thr) { if (y < dMinY) dMinY = y; dMaxY = y; }
              }
              if (dMaxY > dMinY) gridH = dMaxY - dMinY;
            }
            const ratio = gridH / gridW;
            // 1-row page: ratio ≈ 0.33; 4-row page: ratio ≈ 1.33
            cubesTall = ratio < 0.6 ? 1 : 4;
          }

          const pageCubes = extractPageCubes(offscreenCanvas, cubesPerRowPage, cubesTall);
          if (pageCubes) {
            pageResults.push({ cubes: pageCubes, cubesTall });
          }

          const pct = Math.round(((pageNum - 1) / (totalPages - 1)) * 100);
          setProgress(pct, `Page ${pageNum - 1} of ${totalPages - 1}…`);
        } catch (e) {
          console.warn('Error on page', pageNum, e);
        }
      }

      if (pageResults.length === 0) {
        showStatus('No cube patterns found. Is this a Ruwix mosaic PDF?', 'error');
        hideProgress();
        return;
      }

      // Try to extract mosaic dimensions from page 1 text
      let detectedWidth = null;
      let detectedTotal = null;
      try {
        const page1 = await pdf.getPage(1);
        const textContent = await page1.getTextContent();
        const text = textContent.items.map(i => i.str).join(' ');
        // Look for "NxM = K cubes" pattern; width must be divisible by cubesPerRowPage.
        // Try m[1] first, fall back to m[2] in case PDF uses height×width notation.
        const m = text.match(/(\d+)\s*[x×]\s*(\d+)\s*=\s*(\d+)\s*cube/i);
        if (m) {
          const n1 = parseInt(m[1]), n2 = parseInt(m[2]);
          detectedTotal = parseInt(m[3]);
          detectedWidth = (n1 % cubesPerRowPage === 0) ? n1
                        : (n2 % cubesPerRowPage === 0) ? n2
                        : null;
          console.log(`PDF text dims: ${n1}×${n2}=${detectedTotal}, detectedWidth=${detectedWidth}`);
        }
      } catch(e) { /* ignore */ }

      // Post-hoc fix for 1-tall pages misdetected as 4-tall.
      // Ruwix PDFs are column-major (up each column, then next column). The 1-tall
      // pages are the TOP row of each column — the last page within each column group.
      // For numCols=9, numRowsPerCol=10: positions 9, 19, 29, ..., 89.
      const totalExtracted = pageResults.reduce((s, p) => s + p.cubes.length, 0);
      if (detectedTotal && totalExtracted > detectedTotal && detectedWidth && detectedWidth % cubesPerRowPage === 0) {
        const numColsFix = detectedWidth / cubesPerRowPage;
        const numRowsPerColFix = Math.ceil(pageResults.length / numColsFix);
        for (let col = 0; col < numColsFix; col++) {
          const i = (col + 1) * numRowsPerColFix - 1;
          if (pageResults[i] && pageResults[i].cubes.length > cubesPerRowPage) {
            pageResults[i].cubes = pageResults[i].cubes.slice(0, cubesPerRowPage);
            pageResults[i].cubesTall = 1;
          }
        }
      }

      // Ruwix PDFs are column-major: pages go bottom-to-top within each column,
      // then left-to-right across columns. Reorganize into mosaic row-major order
      // (top→bottom, left→right) for correct preview rendering.
      if (detectedWidth && detectedWidth % cubesPerRowPage === 0) {
        const numCols = detectedWidth / cubesPerRowPage;
        const numRowsPerCol = Math.ceil(pageResults.length / numCols);
        console.log(`Reorganizing (col-major): numCols=${numCols} numRowsPerCol=${numRowsPerCol} totalPages=${pageResults.length}`);
        for (let pr = numRowsPerCol - 1; pr >= 0; pr--) {
          const rowCubesTall = pageResults[pr]?.cubesTall || 1;
          for (let cr = 0; cr < rowCubesTall; cr++) {
            for (let pc = 0; pc < numCols; pc++) {
              const pageIdx = pc * numRowsPerCol + pr;
              const pg = pageResults[pageIdx];
              if (!pg) continue;
              for (let cc = 0; cc < cubesPerRowPage; cc++) {
                const cubeIdx = cr * cubesPerRowPage + cc;
                if (cubeIdx < pg.cubes.length) allCubes.push(pg.cubes[cubeIdx]);
              }
            }
          }
        }
      } else {
        for (const pg of pageResults) allCubes.push(...pg.cubes);
      }

      // Populate the target textarea
      const textarea = document.getElementById('patternTargetBox');
      const countInput = document.getElementById('expectedCountInput');
      const widthInput = document.getElementById('mosaicWidthInput');

      if (textarea) {
        textarea.value = allCubes.join('\n');
        appState.patternTargetInput = textarea.value;
        appState.patternPlanState = null;
        appState.patternCountMismatchAcked = false;
      }
      if (detectedTotal && countInput) {
        countInput.value = detectedTotal;
        appState.patternExpectedCount = detectedTotal;
      }
      if (detectedWidth && widthInput) {
        widthInput.value = detectedWidth;
        appState.patternMosaicWidth = detectedWidth;
      }

      hideProgress();
      const msg = detectedTotal
        ? `Imported ${allCubes.length} cubes (PDF says ${detectedTotal}${allCubes.length !== detectedTotal ? ' — count mismatch, check results' : ' ✓'})`
        : `Imported ${allCubes.length} cubes`;
      const isCountOk = !detectedTotal || allCubes.length === detectedTotal;
      showStatus(msg, isCountOk ? 'success' : 'error');

      updateSubmitButton();
      debouncedRenderMosaicPreview();
    }
  })();
  // ── END PDF IMPORT ───────────────────────────────────────────────────────

  document.getElementById('patternTargetBox').oninput = (e) => {
    appState.patternTargetInput = e.target.value;
    appState.patternPlanState = null;
    appState.patternCountMismatchAcked = false; // input changed -- any prior "submit anyway" no longer applies
    updateSubmitButton();
    debouncedRenderMosaicPreview();
    renderTargetCountCheck(e.inputType === 'insertFromPaste');
  };
  document.getElementById('expectedCountInput').oninput = (e) => {
    const v = parseInt(e.target.value, 10);
    appState.patternExpectedCount = (v > 0) ? v : null;
    appState.patternCountMismatchAcked = false;
    updateSubmitButton();
    renderTargetCountCheck();
  };
  document.getElementById('mosaicWidthInput').oninput = (e) => {
    const v = parseInt(e.target.value, 10);
    appState.patternMosaicWidth = (v > 0) ? v : null;
    debouncedRenderMosaicPreview();
  };
  document.getElementById('submitPlanBtn').onclick = handleSubmitPlan;

  renderMosaicPreview();
  renderTargetCountCheck();
  renderPlanResult();
}

// Renders one source-card per row in appState.patternStartRows. Each
// row independently picks a type via 3 explicit radio options --
// "lastExport" (saved mosaic's pattern), "paste" (input color
// pattern), or "solved" (solved cubes) -- then shows that type's
// specific inputs underneath, if any. "solved" is a real, explicit
// row type (not just the absence of a choice): it's the default for
// a new row, and it has no further inputs because a solved cube needs
// no clarification. Rows beyond the first get a "remove" control.
function renderSourceRows(savedExports) {
  const container = document.getElementById('sourceRowsContainer');
  const noSavedExports = savedExports.length === 0;
  container.innerHTML = appState.patternStartRows.map((row, idx) => `
    <div class="source-card active" data-row-id="${row.id}">
      <div class="source-card-title" style="justify-content:space-between; align-items:flex-start;">
        <div class="source-type-options" role="radiogroup" aria-label="Starting cube source for this row">
          <label class="source-type-option">
            <input type="radio" name="rowType${row.id}" id="rowTypeLastExport${row.id}" value="lastExport" ${row.type === 'lastExport' ? 'checked' : ''} ${noSavedExports ? 'disabled' : ''}>
            <span>Saved mosaic's pattern${noSavedExports ? ' <em>(none saved yet)</em>' : ''}</span>
          </label>
          <label class="source-type-option">
            <input type="radio" name="rowType${row.id}" id="rowTypePaste${row.id}" value="paste" ${row.type === 'paste' ? 'checked' : ''}>
            <span>Input color pattern</span>
          </label>
          <label class="source-type-option">
            <input type="radio" name="rowType${row.id}" id="rowTypeSolved${row.id}" value="solved" ${row.type === 'solved' ? 'checked' : ''}>
            <span>Solved cubes</span>
          </label>
        </div>
        ${appState.patternStartRows.length > 1 ? `<button type="button" class="reset-link" style="margin:0; font-size:0.75rem;" id="removeRow${row.id}">remove</button>` : ''}
      </div>
      <div class="source-card-body">
        ${row.type === 'lastExport' ? `
          <select class="pattern-input" id="rowExport${row.id}" aria-label="Choose a saved export to use as the starting source">
            <option value="">-- choose a saved export --</option>
            ${savedExports.map(e => `<option value="${e.name.replace(/"/g, '&quot;')}" ${row.exportName === e.name ? 'selected' : ''}>${e.name} (${e.lines.length} cube${e.lines.length === 1 ? '' : 's'}, saved ${new Date(e.savedAt).toLocaleDateString()})</option>`).join('')}
          </select>
        ` : ''}
        ${row.type === 'paste' ? `
          <p class="panel-desc">One 54-letter U/R/F/D/L/B line per cube. If you have a Ruwix-style PDF describing your STARTING cubes, share it with Claude in chat and ask for this format.</p>
          <textarea class="pattern-input" id="rowPaste${row.id}" placeholder="UUUUUUUUU RRRRRRRRR FFFFFFFFF DDDDDDDDD LLLLLLLLL BBBBBBBBB&#10;(one line per cube)" aria-label="Starting cube states, one 54-letter U R F D L B line per cube">${row.pasteText.replace(/</g, '&lt;')}</textarea>
          <div class="pattern-status ${row.pasteText.trim() === '' ? 'status-empty' : 'status-ok'}" aria-live="polite">${rowPasteCountLabel(row)}</div>
        ` : ''}
        ${row.type === 'solved' ? `<p class="panel-desc" style="margin:0;">Any cubes covered by this row start solved &mdash; no further setup needed.</p>` : ''}
      </div>
    </div>
  `).join('');

  appState.patternStartRows.forEach(row => {
    ['lastExport', 'paste', 'solved'].forEach(typeValue => {
      const radio = document.getElementById(`rowType${typeValue === 'lastExport' ? 'LastExport' : typeValue === 'paste' ? 'Paste' : 'Solved'}${row.id}`);
      if (radio) radio.onchange = (e) => {
        if (!e.target.checked) return;
        row.type = typeValue;
        appState.patternPlanState = null;
        render();
      };
    });
    const removeBtn = document.getElementById(`removeRow${row.id}`);
    if (removeBtn) removeBtn.onclick = () => {
      appState.patternStartRows = appState.patternStartRows.filter(r => r.id !== row.id);
      appState.patternPlanState = null;
      render();
    };
    const exportSelect = document.getElementById(`rowExport${row.id}`);
    if (exportSelect) exportSelect.onchange = (e) => {
      row.exportName = e.target.value || null;
      appState.patternPlanState = null;
      updateSubmitButton();
    };
    const pasteBox = document.getElementById(`rowPaste${row.id}`);
    if (pasteBox) pasteBox.oninput = (e) => {
      row.pasteText = e.target.value;
      appState.patternPlanState = null;
      updateSubmitButton();
      // Update just this row's count label in place, rather than
      // re-rendering the textarea itself, so typing doesn't fight with
      // cursor position/scroll on a long pasted list.
      const statusEl = pasteBox.parentElement.querySelector('.pattern-status');
      if (statusEl) {
        statusEl.className = `pattern-status ${row.pasteText.trim() === '' ? 'status-empty' : 'status-ok'}`;
        statusEl.textContent = rowPasteCountLabel(row);
      }
    };
  });
}

// A row "counts" toward contributing real cubes if it's configured
// enough to (potentially) add at least one. This is informational
// only -- submitting doesn't require any row to contribute real
// cubes, since an all-"solved cubes" pool just means "everything is a
// solved cube," which is a perfectly valid plan.
function rowIsFilled(row) {
  if (row.type === 'lastExport') return !!row.exportName;
  if (row.type === 'paste') return row.pasteText.trim() !== '';
  return false;
}

function canSubmitPattern() {
  return appState.patternTargetInput.trim() !== '';
}

function submitPlanLabel() {
  if (appState.patternTargetInput.trim() === '') return 'Paste target mosaic patterns first';
  return 'Submit: build mosaic plan';
}

function updateSubmitButton() {
  const btn = document.getElementById('submitPlanBtn');
  if (!btn) return;
  btn.disabled = !canSubmitPattern();
  btn.textContent = submitPlanLabel();
}

// Renders the result of the last "Submit" click: a summary row, then
// one card per placement (free or solved), each showing exactly what
// to do with that physical cube. Errors (bad input lines, unsolvable
// patterns) are shown separately and don't block the placements that
// DID succeed.
// Converts a 1-based target line number into a 1-based {row, col}
// position, given a mosaic width in cubes. Returns null if width is
// unknown -- callers fall back to showing just the line number.
function gridPositionForLine(lineNum, width) {
  if (!width || width <= 0 || !lineNum) return null;
  const idx = lineNum - 1;
  return { row: Math.floor(idx / width) + 1, col: (idx % width) + 1 };
}

// Builds the "where does this go" mini-map shown in the cube viewer
// modal: a zoomed-in close-up of the current cube's immediate
// neighborhood (the thing your eye actually uses while standing over
// a table of cubes -- "is it this one or the one next to it"), plus a
// tiny whole-mosaic thumbnail with a marker dot for overall context
// ("am I in the corner or the middle of this thing"). Both read from
// the same parsed target list and the same color mapping as the
// pre-submit preview (renderMosaicPreview), so the two never disagree.
// Returns an HTML string, or '' if there isn't enough info to draw
// anything (no known mosaic width, or the target list doesn't parse).
function buildCubeViewerMinimapHtml(targetsInput, width, currentLineNum) {
  if (!width || width <= 0 || !currentLineNum) return '';
  const { targets } = parseMosaicTargets(targetsInput);
  if (targets.length === 0) return '';

  const rows = Math.ceil(targets.length / width);
  const cur = gridPositionForLine(currentLineNum, width); // 1-based {row, col}
  if (!cur) return '';

  const colorFor = (lineNum) => {
    const t = targets[lineNum - 1];
    return t ? paletteIdToHex(CODE_TO_PALETTE_ID[t.mosaicPattern[4]]) : null;
  };

  // --- Close-up: a fixed neighborhood window around the current cube ---
  const HALF = 3; // 7x7 window
  const closeupCells = [];
  for (let r = cur.row - HALF; r <= cur.row + HALF; r++) {
    for (let c = cur.col - HALF; c <= cur.col + HALF; c++) {
      const inBounds = r >= 1 && r <= rows && c >= 1 && c <= width;
      const isCurrent = r === cur.row && c === cur.col;
      const lineNum = inBounds ? (r - 1) * width + c : null;
      const hex = inBounds ? colorFor(lineNum) : null;
      const cls = ['cube-viewer-minimap-cell'];
      if (isCurrent) cls.push('current');
      if (!hex) cls.push('empty');
      closeupCells.push(`<div class="${cls.join(' ')}" style="${hex ? `background:${hex};` : ''}" title="${inBounds ? `row ${r}, col ${c}` : ''}"></div>`);
    }
  }
  const closeupSize = HALF * 2 + 1;
  const closeup = `
    <div aria-hidden="true">
      <div class="cube-viewer-minimap-closeup" style="grid-template-columns:repeat(${closeupSize}, 18px);">${closeupCells.join('')}</div>
      <div class="cube-viewer-minimap-label">nearby cubes</div>
    </div>`;

  // --- Thumbnail: the whole mosaic, tiny, with a marker dot ---
  const cellPx = targets.length > 2000 ? 1 : (targets.length > 500 ? 2 : 3);
  const thumbW = width * cellPx;
  const thumbH = rows * cellPx;
  const canvas = document.createElement('canvas');
  canvas.width = thumbW;
  canvas.height = thumbH;
  const ctx = canvas.getContext('2d');
  for (let i = 0; i < targets.length; i++) {
    const hex = colorFor(i + 1);
    ctx.fillStyle = hex || '#1c1a17';
    const r = Math.floor(i / width), c = i % width;
    ctx.fillRect(c * cellPx, r * cellPx, cellPx, cellPx);
  }
  const markerLeft = (cur.col - 0.5) * cellPx;
  const markerTop = (cur.row - 0.5) * cellPx;
  const thumb = `
    <div class="cube-viewer-minimap-thumb-wrap">
      <div class="cube-viewer-minimap-thumb" style="width:${thumbW}px; height:${thumbH}px;">
        <img src="${canvas.toDataURL()}" width="${thumbW}" height="${thumbH}" style="display:block; image-rendering:pixelated;" alt="Mosaic thumbnail, ${width} cubes wide by ${rows} tall, with the current cube marked at row ${cur.row}, column ${cur.col}.">
        <div class="cube-viewer-minimap-marker" style="left:${markerLeft}px; top:${markerTop}px;" aria-hidden="true"></div>
      </div>
      <div class="cube-viewer-minimap-label">whole mosaic</div>
    </div>`;

  return `<div class="cube-viewer-minimap">${closeup}${thumb}</div>`;
}

// Renders a lightweight visual grid preview of the pasted target list,
// using each target's CENTER cell as its representative color (the
// center is what's actually most visible on a real mosaic from a
// distance, and it's also the one cell that's physically guaranteed --
// see the center-color/target-face discussion). Lets you sanity-check
// the overall shape/silhouette against your source image BEFORE
// submitting, while mistakes are still cheap to fix.
function renderMosaicPreview() {
  const el = document.getElementById('mosaicPreviewArea');
  if (!el) return;
  const width = appState.patternMosaicWidth;
  const { targets } = parseMosaicTargets(appState.patternTargetInput);
  if (!width || targets.length === 0) { el.innerHTML = ''; return; }

  const cellPx = targets.length > 2000 ? 4 : (targets.length > 500 ? 6 : 10);
  const rows = Math.ceil(targets.length / width);
  // Array + single join, rather than repeated string concatenation --
  // meaningfully faster than += in a loop once this runs into the
  // thousands of cells (a real mosaic can be many hundreds of cubes).
  const cellParts = [];
  for (let i = 0; i < rows * width; i++) {
    const target = targets[i];
    const hex = target ? paletteIdToHex(CODE_TO_PALETTE_ID[target.mosaicPattern[4]]) : '#000';
    cellParts.push(`<div style="width:${cellPx}px; height:${cellPx}px; background:${hex};"></div>`);
  }
  const grid = `<div aria-hidden="true" style="margin-top:10px; display:grid; grid-template-columns:repeat(${width}, ${cellPx}px); gap:1px; background:#000; padding:4px; border-radius:6px; width:fit-content; max-width:100%; overflow:auto;">${cellParts.join('')}</div>`;
  const caption = `<p class="panel-desc" style="margin-top:6px;">${targets.length} cube${targets.length === 1 ? '' : 's'} across ${rows} row${rows === 1 ? '' : 's'} of ${width}. Check this matches your source image's shape before submitting.</p>`;
  el.innerHTML = grid + caption;
}

// Debounced wrapper: for a large mosaic (hundreds/thousands of target
// lines), regenerating the grid preview on EVERY keystroke while
// pasting/typing is noticeably laggy (measured ~190ms per keystroke at
// 900 targets during development). Instead, show a cheap "updating..."
// placeholder immediately, then only do the real (more expensive)
// render once typing has paused for a moment.
let mosaicPreviewDebounceTimer = null;
function debouncedRenderMosaicPreview() {
  const el = document.getElementById('mosaicPreviewArea');
  if (el && appState.patternTargetInput.trim() !== '' && appState.patternMosaicWidth) {
    el.innerHTML = '<p class="panel-desc" style="margin-top:10px;">Updating preview&hellip;</p>';
  }
  if (mosaicPreviewDebounceTimer) clearTimeout(mosaicPreviewDebounceTimer);
  mosaicPreviewDebounceTimer = setTimeout(() => {
    mosaicPreviewDebounceTimer = null;
    renderMosaicPreview();
  }, 300);
}

// Returns the actual parsed line count vs. the expected count, or null
// if there's nothing to check (no expected count set, or no target
// text yet). This is intentionally a count-only check, independent of
// mosaicWidth/shape and independent of whether each line is itself
// valid -- a PDF conversion that drops or duplicates a whole line is
// exactly the kind of error that's invisible line-by-line but obvious
// once you compare against the number the source material claims.
function targetCountMismatch() {
  const expected = appState.patternExpectedCount;
  if (!expected) return null;
  const { targets } = parseMosaicTargets(appState.patternTargetInput);
  if (appState.patternTargetInput.trim() === '') return null;
  if (targets.length === expected) return null;
  return { expected, actual: targets.length };
}

// Renders a small status line under the target textarea: green
// confirmation when the parsed count matches the expected count, a
// red mismatch warning when it doesn't, or nothing when there's no
// expected count to check against yet. This runs on every keystroke
// (cheap -- just a line count, not a full preview re-render) so the
// mismatch is visible immediately, before the user ever reaches
// Submit, rather than only being caught by the confirm-gate there.
// Renders a small status area under the target textarea: per-line
// parse errors (bad letter, wrong length) shown immediately as you
// type/paste, followed by a count-match check when an expected count
// was given. Runs on every keystroke -- parseMosaicTargets is cheap
// (just splitting/regex over the text, no actual cube-solving), so
