// there's no need to debounce it the way the heavier visual mosaic
// preview is debounced.
//
// Line errors take priority over the count message: a wrong-length or
// bad-letter line gets REJECTED by parseMosaicTargets and excluded
// from `targets`, so a count mismatch that coincides with line errors
// is often just a symptom of those same bad lines, not a separate
// problem -- showing both at once would tell the person to investigate
// two things when fixing the one cause clears both. Capped at the
// first 6 errors so a systematic mistake (e.g. every line missing a
// trailing letter from a bad copy-paste) is visible at a glance
// without flooding the panel for a large mosaic with one bad pattern.
const TARGET_ERROR_DISPLAY_LIMIT = 6;

function renderTargetCountCheck(isPaste) {
  const el = document.getElementById('targetCountCheckArea');
  if (!el) return;
  const rawInput = appState.patternTargetInput;
  if (rawInput.trim() === '') { el.innerHTML = ''; return; }

  // While actively typing, the last line is presumed still in progress
  // (no trailing newline committed yet) -- validating it here would
  // flag a perfectly normal "only typed 3 of 9 letters so far" as an
  // error on every keystroke. Drop it from THIS live check only; the
  // full text (last line included) is still validated for real at
  // Submit via parseMosaicTargets directly, so nothing slips through
  // uncaught, this just avoids announcing/flashing a false alarm while
  // someone is mid-line.
  //
  // Two cases count as "nothing left mid-edit", so the last line gets
  // checked immediately rather than excluded: a trailing newline (the
  // line was already committed, e.g. typing carried on past it), OR a
  // genuine paste event (isPaste) -- a pasted block arrives complete
  // in one shot with no line left "still being typed", even when (as
  // is common, e.g. text copied from a PDF or from Claude's own reply)
  // it has no trailing blank line of its own.
  const endsWithNewline = /\n\s*$/.test(rawInput);
  const lastLineIsSafeToCheck = endsWithNewline || isPaste;
  const linesForCheck = lastLineIsSafeToCheck ? rawInput.split('\n') : rawInput.split('\n').slice(0, -1);
  const textForCheck = linesForCheck.join('\n');

  const { targets, errors } = parseMosaicTargets(textForCheck);

  if (errors.length > 0) {
    const shown = errors.slice(0, TARGET_ERROR_DISPLAY_LIMIT).map(e => e.replace(/</g, '&lt;'));
    const more = errors.length > TARGET_ERROR_DISPLAY_LIMIT ? `<br>&hellip; and ${errors.length - TARGET_ERROR_DISPLAY_LIMIT} more line${errors.length - TARGET_ERROR_DISPLAY_LIMIT === 1 ? '' : 's'} with the same kind of problem.` : '';
    el.innerHTML = `<div class="pattern-status status-error">⚠ ${errors.length} line${errors.length === 1 ? '' : 's'} couldn't be read:<br>${shown.join('<br>')}${more}</div>`;
    return;
  }

  const expected = appState.patternExpectedCount;
  if (!expected) { el.innerHTML = ''; return; }
  const actual = targets.length;
  if (actual === expected) {
    el.innerHTML = `<div class="pattern-status status-ok">✓ ${actual} cubes parsed -- matches the expected count.</div>`;
  } else {
    const diff = actual - expected;
    const diffLabel = diff > 0 ? `${diff} too many` : `${-diff} too few`;
    el.innerHTML = `<div class="pattern-status status-error">⚠ ${actual} cube${actual === 1 ? '' : 's'} parsed, but you said this mosaic should have ${expected} (${diffLabel}). Check for a dropped/duplicated line, a row that got merged, or a paste that got cut off before submitting.</div>`;
  }
}

function renderPlanResult() {
  const el = document.getElementById('planResultArea');
  const planState = appState.patternPlanState;

  if (!planState) {
    // No active run -- offer to resume one left in localStorage from
    // an earlier session (e.g. the page was reloaded mid-mosaic).
    const saved = loadPlanRunProgress();
    if (saved && saved.status === 'running') {
      el.innerHTML = `
        <div class="result-box" style="margin-top:12px;">
          <div class="status">⏸ Unfinished mosaic plan found</div>
          <div style="font-size:0.85rem; line-height:1.5;">${saved.doneCount} of ${saved.totalCount} cubes were already worked out before this was interrupted (e.g. a page reload). Resume to pick up exactly where it left off, or discard to start fresh.</div>
          <div style="display:flex; gap:8px; margin-top:10px;">
            <button class="secondary-btn" id="resumePlanBtn" style="margin:0; flex:1;">Resume</button>
            <button class="secondary-btn" id="discardPlanBtn" style="margin:0; flex:1;">Discard</button>
          </div>
        </div>`;
      document.getElementById('resumePlanBtn').onclick = handleResumePlan;
      document.getElementById('discardPlanBtn').onclick = handleDiscardSavedPlan;
    } else {
      el.innerHTML = '';
    }
    return;
  }

  const freeCount = planState.placements.filter(p => p.type === 'free').length;
  const solveCount = planState.placements.filter(p => p.type === 'solve').length;
  const totalMoves = planState.placements.reduce((sum, p) => sum + p.moveCount, 0);
  const placedCount = planState.placements.filter(p => p.placed).length;
  const width = planState.mosaicWidth;

  const errorBlock = planState.errors.length > 0 ? `
    <div class="result-box error" style="margin-top:12px;">
      <div class="status">⚠ ${planState.errors.length} issue${planState.errors.length === 1 ? '' : 's'}</div>
      <div style="font-size:0.8rem; line-height:1.5;">${planState.errors.map(e => e.replace(/</g, '&lt;')).join('<br>')}</div>
    </div>` : '';

  const progressBlock = planState.status === 'running' ? `
    <div class="result-box" style="margin-top:0;">
      <div class="status">⏳ Solving&hellip; ${planState.doneCount} of ${planState.totalCount}</div>
      <div style="background:#111; border-radius:6px; height:10px; overflow:hidden; margin:8px 0;">
        <div style="background:var(--accent); height:100%; width:${(100 * planState.doneCount / Math.max(1, planState.totalCount)).toFixed(1)}%; transition:width 0.15s;"></div>
      </div>
      <button class="secondary-btn" id="cancelPlanBtn" style="margin:0; width:100%; text-align:center;">Cancel</button>
    </div>
  ` : (planState.status === 'cancelled' ? `
    <div class="result-box error" style="margin-top:0;">
      <div class="status">✗ Cancelled at ${planState.doneCount} of ${planState.totalCount}</div>
      <div style="font-size:0.85rem;">What's listed below is everything completed before cancelling. Submit again to redo the rest from scratch.</div>
    </div>
  ` : '');

  // Row-range filter -- lets you narrow the (potentially huge) list
  // down to just the physical section of the mosaic you're working on
  // right now, instead of scrolling through hundreds of entries.
  const filter = appState.patternPlanRowFilter;
  const filterActive = width && filter && (filter.from || filter.to);
  const visiblePlacements = planState.placements.filter(p => {
    if (!filterActive) return true;
    const pos = gridPositionForLine(p.targetLineNum, width);
    if (!pos) return true;
    if (filter.from && pos.row < filter.from) return false;
    if (filter.to && pos.row > filter.to) return false;
    return true;
  });

  const rowFilterBlock = (width && planState.status !== 'running') ? `
    <div class="matcher-row" style="margin-top:10px;">
      <label for="rowFilterFrom">Show rows</label>
      <input type="number" min="1" id="rowFilterFrom" value="${filter && filter.from ? filter.from : ''}" placeholder="from" style="width:60px;">
      <label for="rowFilterTo">to</label>
      <input type="number" min="1" id="rowFilterTo" value="${filter && filter.to ? filter.to : ''}" placeholder="to" style="width:60px;">
      ${filterActive ? `<button type="button" class="reset-link" style="margin:0;" id="clearRowFilterBtn">show all</button>` : ''}
    </div>
  ` : '';

  el.innerHTML = `
    ${progressBlock}
    <div class="plan-summary">
      <div class="match-stat free"><div class="num">${freeCount}</div><div class="lbl">free reuse${freeCount === 1 ? '' : 's'}</div></div>
      <div class="match-stat remaining"><div class="num">${solveCount}</div><div class="lbl">${planState.status === 'running' ? 'solved so far' : 'needed solving'}</div></div>
      <div class="match-stat"><div class="num">${totalMoves}</div><div class="lbl">total moves</div></div>
      ${planState.status !== 'running' ? `<div class="match-stat free"><div class="num">${placedCount}/${planState.placements.length}</div><div class="lbl">physically placed</div></div>` : ''}
    </div>
    ${rowFilterBlock}
    ${planState.placements.length > 0 ? `
    <div class="match-list">
      ${visiblePlacements.map((p) => {
        const i = planState.placements.indexOf(p);
        const pos = gridPositionForLine(p.targetLineNum, width);
        const posLabel = pos ? `row ${pos.row}, col ${pos.col}` : `line ${p.targetLineNum}`;
        return `
        <div class="match-item ${p.type === 'solve' ? 'solve-item' : ''}" style="${p.placed ? 'opacity:0.45;' : ''}">
          ${planState.status !== 'running' ? `<input type="checkbox" id="placedCheck${i}" ${p.placed ? 'checked' : ''} style="flex-shrink:0; width:18px; height:18px; accent-color:var(--success);" aria-label="Mark target ${posLabel}, pattern ${p.mosaicPattern}, as physically placed">` : ''}
          <span class="match-badge ${p.type === 'solve' ? 'badge-solve' : ''}">${p.type === 'free' ? 'FREE' : `${p.moveCount} MOVE${p.moveCount === 1 ? '' : 'S'}`}</span>
          <span class="match-detail">
            Target ${posLabel} <strong>${p.mosaicPattern}</strong> <span class="pool-tag">${p.sourceLabel}</span>
            ${p.type === 'free'
              ? ` &mdash; show <strong>${FACE_FULL_NAMES[p.face]}</strong> face, rotated ${p.rotation}&deg;. No moves needed.`
              : ` &mdash; turns: <span style="font-family:'SF Mono',Monaco,monospace;">${p.moves}</span>, then show the <strong>${FACE_FULL_NAMES[p.face]}</strong> face.`
            }
          </span>
          ${(planState.status !== 'running' && p.type === 'solve') ? `<button class="cube-viewer-trigger" style="border:none; border-radius:6px; padding:4px 8px; font-size:0.7rem; cursor:pointer; flex-shrink:0;" id="showMeBtn${i}" aria-label="Show 3D turn-by-turn animation for target ${posLabel}, pattern ${p.mosaicPattern}">▶ Show me</button>` : ''}
          ${planState.status !== 'running' ? `<button type="button" class="reset-link" style="margin:0; font-size:0.7rem; flex-shrink:0;" id="editRowBtn${i}" aria-label="Fix target ${posLabel}, pattern ${p.mosaicPattern}">fix</button>` : ''}
        </div>
        <div id="editRowArea${i}" aria-live="polite"></div>
      `;
      }).join('')}
    </div>
    ${filterActive && visiblePlacements.length === 0 ? '<p class="panel-desc">No targets in that row range.</p>' : ''}
    ` : '<p class="panel-desc">No placements produced yet.</p>'}
    ${errorBlock}
    ${planState.status !== 'running' ? `
    <div style="display:flex; gap:8px; margin-top:12px;">
      <button class="secondary-btn" id="copyPlanBtn" style="flex:1; margin:0; text-align:center;">Copy as text</button>
      <button class="secondary-btn" id="downloadPlanBtn" style="flex:1; margin:0; text-align:center;">Download .txt</button>
      <button class="secondary-btn" id="printPlanBtn" style="flex:1; margin:0; text-align:center;">Print</button>
    </div>
    ` : ''}
  `;

  const cancelBtn = document.getElementById('cancelPlanBtn');
  if (cancelBtn) cancelBtn.onclick = handleCancelPlan;
  const copyBtn = document.getElementById('copyPlanBtn');
  if (copyBtn) copyBtn.onclick = () => {
    navigator.clipboard.writeText(exportPlanText(planState)).catch(() => {});
    copyBtn.textContent = 'Copied!';
  };
  const downloadBtn = document.getElementById('downloadPlanBtn');
  if (downloadBtn) downloadBtn.onclick = () => handleDownloadPlan(planState);
  const printBtn = document.getElementById('printPlanBtn');
  if (printBtn) printBtn.onclick = () => handlePrintPlan(planState);
  const fromInput = document.getElementById('rowFilterFrom');
  const toInput = document.getElementById('rowFilterTo');
  if (fromInput) fromInput.oninput = (e) => {
    appState.patternPlanRowFilter = appState.patternPlanRowFilter || {};
    appState.patternPlanRowFilter.from = parseInt(e.target.value, 10) || null;
    renderPlanResult();
  };
  if (toInput) toInput.oninput = (e) => {
    appState.patternPlanRowFilter = appState.patternPlanRowFilter || {};
    appState.patternPlanRowFilter.to = parseInt(e.target.value, 10) || null;
    renderPlanResult();
  };
  const clearFilterBtn = document.getElementById('clearRowFilterBtn');
  if (clearFilterBtn) clearFilterBtn.onclick = () => {
    appState.patternPlanRowFilter = null;
    renderPlanResult();
  };
  visiblePlacements.forEach((p) => {
    const i = planState.placements.indexOf(p);
    const checkbox = document.getElementById(`placedCheck${i}`);
    if (checkbox) checkbox.onchange = (e) => {
      planState.placements[i].placed = e.target.checked;
      if (planState.status === 'done') savePlanRunProgress(planState);
      renderPlanResult();
    };
    const showMeBtn = document.getElementById(`showMeBtn${i}`);
    if (showMeBtn) showMeBtn.onclick = () => openCubeViewer(i);
  });
  if (planState.status !== 'running') {
    planState.placements.forEach((p, i) => {
      const btn = document.getElementById(`editRowBtn${i}`);
      if (btn) btn.onclick = () => renderEditRow(i);
    });
  }
}

// Shows an inline mini-form under a single placement row, letting you
// correct that ONE target's 9-letter pattern and re-solve just that
// row -- without resubmitting (and re-waiting on) the entire mosaic.
// Re-solves against a fresh solved cube (the simplest always-correct
// choice for a single isolated fix; re-deriving which pool cube was
// originally assigned to this row would require re-running the whole
// allocation, which defeats the point of a quick single-row fix).
function renderEditRow(i) {
  const area = document.getElementById(`editRowArea${i}`);
  if (!area) return;
  const planState = appState.patternPlanState;
  const p = planState.placements[i];
  area.innerHTML = `
    <div class="matcher-row" style="margin:4px 0 10px;">
      <input type="text" class="pattern-input" style="margin:0; width:160px;" id="editRowInput${i}" value="${p.mosaicPattern}" maxlength="9" aria-label="Corrected 9-letter target pattern for target ${p.targetLineNum}">
      <button class="secondary-btn" style="margin:0;" id="editRowSolveBtn${i}">Re-solve this cube</button>
      <button type="button" class="reset-link" style="margin:0;" id="editRowCancelBtn${i}">cancel</button>
    </div>
  `;
  document.getElementById('editRowCancelBtn' + i).onclick = () => { area.innerHTML = ''; };
  document.getElementById('editRowSolveBtn' + i).onclick = () => {
    const raw = document.getElementById(`editRowInput${i}`).value.trim().toUpperCase();
    const { targets, errors } = parseMosaicTargets(raw);
    if (errors.length > 0 || targets.length !== 1) {
      area.innerHTML = `<div class="pattern-status status-error">${errors[0] || 'Enter exactly 9 letters (W/Y/R/O/B/G).'}</div>`;
      return;
    }
    const target = targets[0];
    const targetFace = target.cubeGrid[1][1];
    let result;
    try {
      result = solveForFace(solvedStateString(), targetFace, target.cubeGrid);
    } catch (e) {
      result = { success: false, error: `Unexpected error: ${e.message}` };
    }
    if (!result.success) {
      area.innerHTML = `<div class="pattern-status status-error">${result.error}</div>`;
      return;
    }
    planState.placements[i] = {
      targetLineNum: p.targetLineNum,
      mosaicPattern: target.mosaicPattern,
      type: 'solve',
      sourceLabel: 'fresh solved cube (manual fix)',
      face: targetFace,
      rotation: 0,
      moves: result.moves,
      moveCount: result.moveCount,
      startStr: solvedStateString(),
      finalStr: result.finalStr,
      placed: false, // re-solved -- if the old version was already marked placed, that's now stale/wrong
    };
    appState.solveLog.push({ source: 'pattern', label: `target line ${p.targetLineNum} (manual fix)`, resultStr: result.finalStr });
    if (planState.status === 'done') savePlanRunProgress(planState); // keep any persisted copy in sync, in case it's later resumed/inspected
    renderPlanResult();
  };
}

function exportPlanText(planState) {
  const width = planState.mosaicWidth;
  return planState.placements.map(p => {
    const pos = gridPositionForLine(p.targetLineNum, width);
    const posLabel = pos ? `row ${pos.row} col ${pos.col}` : `line ${p.targetLineNum}`;
    const prefix = p.placed ? '[DONE] ' : '';
    if (p.type === 'free') {
      return `${prefix}Target ${posLabel} (${p.mosaicPattern}): use ${p.sourceLabel} -- show its ${FACE_FULL_NAMES[p.face]} face rotated ${p.rotation}\u00b0. No moves needed.`;
    }
    return `${prefix}Target ${posLabel} (${p.mosaicPattern}): use ${p.sourceLabel} -- turns: ${p.moves} -- then show its ${FACE_FULL_NAMES[p.face]} face. (${p.moveCount} moves)`;
  }).join('\n');
}

// Downloads the full plan as a plain-text file -- more durable than
// clipboard copy for a long mosaic (hundreds of rows): the clipboard
// silently gets overwritten by the next thing you copy, with no
// warning, while a downloaded file stays put until you delete it, and
// can be kept open on a second device/tab while you work through cubes
// on the first.
function handleDownloadPlan(planState) {
  const text = exportPlanText(planState);
  if (!text.trim()) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `mosaic_plan_${new Date().toISOString().slice(0, 10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Builds a self-contained, LIGHT-background, print-friendly HTML
// document listing every placement -- the main app's dark theme and
// interactive buttons aren't meant for paper, so this is a separate,
// minimal rendering: plain black-on-white text, one row per cube,
// readable at a glance while your hands are full of an actual cube.
function buildPrintablePlanHtml(planState) {
  const width = planState.mosaicWidth;
  const rows = planState.placements.map(p => {
    const pos = gridPositionForLine(p.targetLineNum, width);
    const posLabel = pos ? `Row ${pos.row}, Col ${pos.col}` : `Line ${p.targetLineNum}`;
    const instruction = p.type === 'free'
      ? `Show ${FACE_FULL_NAMES[p.face]} face, rotated ${p.rotation}\u00b0 &mdash; no moves needed`
      : `Turns: <strong>${p.moves}</strong> &mdash; then show ${FACE_FULL_NAMES[p.face]} face (${p.moveCount} moves)`;
    return `
      <tr style="${p.placed ? 'color:#767676;' : ''}">
        <td style="padding:4px 8px; border-bottom:1px solid #ddd;">${p.placed ? '\u2611' : '\u2610'}</td>
        <td style="padding:4px 8px; border-bottom:1px solid #ddd;">${posLabel}</td>
        <td style="padding:4px 8px; border-bottom:1px solid #ddd; font-family:monospace;">${p.mosaicPattern}</td>
        <td style="padding:4px 8px; border-bottom:1px solid #ddd;">${p.sourceLabel}</td>
        <td style="padding:4px 8px; border-bottom:1px solid #ddd;">${instruction}</td>
      </tr>`;
  }).join('');
  return `<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><title>Mosaic plan</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; color: #111; margin: 24px; }
  h1 { font-size: 1.2rem; margin-bottom: 4px; }
  .meta { color: #555; font-size: 0.85rem; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; padding: 6px 8px; border-bottom: 2px solid #111; }
  @media print { body { margin: 8mm; } }
</style></head>
<body>
  <h1>Mosaic plan</h1>
  <div class="meta">${planState.placements.length} cubes &middot; ${planState.placements.filter(p=>p.type==='free').length} free reuses &middot; ${planState.placements.filter(p=>p.type==='solve').length} need turns &middot; generated ${new Date().toLocaleString()}</div>
  <table>
    <thead><tr><th scope="col">Done</th><th scope="col">Position</th><th scope="col">Pattern</th><th scope="col">Source cube</th><th scope="col">Instructions</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>
</body></html>`;
}

// Opens the print-friendly version in a new tab and triggers the
// browser's native print dialog. Falls back to a plain download of
// the HTML if the popup is blocked, so it's never a dead end.
function handlePrintPlan(planState) {
  const html = buildPrintablePlanHtml(planState);
  const printWindow = window.open('', '_blank');
  if (!printWindow) {
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `mosaic_plan_print_${new Date().toISOString().slice(0, 10)}.html`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert('Your browser blocked the print popup, so a printable HTML file was downloaded instead -- open it and print from there.');
    return;
  }
  printWindow.document.write(html);
  printWindow.document.close();
  printWindow.onload = () => { printWindow.focus(); printWindow.print(); };
}

const PLAN_CHUNK_SIZE = 8; // real solves per tick -- small enough to keep the UI responsive, large enough not to waste time on scheduling overhead

// Starts a NEW plan run from scratch: clears any in-progress run,
// builds the cheap free-match phase synchronously, then kicks off the
// chunked solve loop. Every real solve's verified resulting state is
// recorded into solveLog as it completes (not just at the end) -- a
// free match's resulting state is the SAME physical cube, unmoved, so
// it's just as real and reusable for a future mosaic as a solve's
// result; skipping it would silently drop it from any future "Use a
// previously saved mosaic's pattern" pool.
function handleSubmitPlan() {
  if (!canSubmitPattern()) return;
  // Hard gate: if an expected cube count was given and the parsed
  // target list doesn't match it, force an explicit confirmation
  // before proceeding -- a wrong line count silently shifts every
  // row/column mapping after the bad line, so this is worth stopping
  // for even though the textarea already shows the same warning in
  // red. Skipped if the user already clicked through this SAME
  // mismatch (patternCountMismatchAcked); changing the target text or
  // the expected count resets that flag so a stale "yes" can't cover
  // a new, different mismatch.
  const mismatch = targetCountMismatch();
  if (mismatch && !appState.patternCountMismatchAcked) {
    const msg = `You said this mosaic should have ${mismatch.expected} cubes, but ${mismatch.actual} were parsed from the pasted patterns (${mismatch.actual > mismatch.expected ? mismatch.actual - mismatch.expected + ' too many' : mismatch.expected - mismatch.actual + ' too few'}).\n\nThis usually means a dropped, duplicated, or merged line from the PDF conversion -- continuing will plan and assign physical cubes against that miscounted list.\n\nSubmit anyway?`;
    if (typeof confirm === 'function' && !confirm(msg)) return;
    appState.patternCountMismatchAcked = true;
  }
  // Resubmitting throws away the CURRENT plan -- including any manual
  // "fix" edits and physically-placed checkmarks, which have no other
  // backup. Confirm first if there's something real to lose; a plan
  // that's still running, or one with zero placements yet, has nothing
  // at risk and can proceed silently.
  const existing = appState.patternPlanState;
  if (existing && existing.status !== 'running' && existing.placements.length > 0) {
    const placedCount = existing.placements.filter(p => p.placed).length;
    const warning = placedCount > 0
      ? `This will discard the current plan, including ${placedCount} cube${placedCount === 1 ? '' : 's'} marked as physically placed. Continue?`
      : `This will discard the current plan (${existing.placements.length} placement${existing.placements.length === 1 ? '' : 's'}). Continue?`;
    if (typeof confirm === 'function' && !confirm(warning)) return;
  }
  appState.patternPlanRowFilter = null;
  clearPlanRunProgress();
  let planState;
  try {
    planState = initPlanRun(appState.patternTargetInput);
  } catch (e) {
    planState = { status: 'done', targetsInput: appState.patternTargetInput, totalCount: 0, doneCount: 0, placements: [], errors: [`Unexpected error: ${e.message}`], solveQueue: [], poolQueue: [], leftoverPoolCount: 0 };
  }
  appState.patternPlanState = planState;
  logNewPlacements(planState, 0);
  render();
  if (planState.status === 'running') {
    announcePlanStatus(`Solving ${planState.totalCount} cubes…`);
    runPlanLoop();
  }
}

// Resumes a plan run found in localStorage (offered after a reload if
// one was left mid-progress). Re-logs only placements not already in
// solveLog this session (a fresh page load has an empty solveLog, so
// in practice this just re-logs everything completed so far).
function handleResumePlan() {
  const saved = loadPlanRunProgress();
  if (!saved) return;
  appState.patternPlanState = saved;
  appState.patternTargetInput = saved.targetsInput;
  if (saved.mosaicWidth) appState.patternMosaicWidth = saved.mosaicWidth;
  logNewPlacements(saved, 0);
  render();
  if (saved.status === 'running') {
    announcePlanStatus(`Resuming. ${saved.doneCount} of ${saved.totalCount} already done.`);
    runPlanLoop();
  }
}

function handleDiscardSavedPlan() {
  clearPlanRunProgress();
  render();
}

// Records every placement from index `fromIdx` onward into solveLog
// (used both right after the free-match phase, and incrementally as
// each chunk completes, so solveLog and the saved-export picker always
// reflect real progress even if the run is interrupted).
function logNewPlacements(planState, fromIdx) {
  for (let i = fromIdx; i < planState.placements.length; i++) {
    const p = planState.placements[i];
    appState.solveLog.push({ source: 'pattern', label: `target line ${p.targetLineNum}`, resultStr: p.finalStr });
  }
}

// The chunked loop itself: processes one chunk, persists progress,
// updates the UI, and -- unless cancelled or finished -- schedules the
// next chunk via setTimeout(0) so the browser gets to repaint/respond
// between chunks instead of freezing for the whole run.
//
// announcePlanStatus pushes text into the sr-only live region added
// alongside planResultArea. It's called only at real status
// transitions (run started / finished / cancelled), NOT once per
// chunk -- runPlanLoop ticks many times per second for a large
// mosaic, and re-announcing "Solving... N of M" on every tick would
// bury a screen reader user in noise. The visible progress bar
// already covers the in-between ticks for sighted users; this just
// makes sure the start and end points aren't silent for everyone else.
function announcePlanStatus(text) {
  const el = document.getElementById('planRunStatusAnnouncer');
  if (el) el.textContent = text;
}

function runPlanLoop() {
  const planState = appState.patternPlanState;
  if (!planState || planState.status !== 'running') return;

  const beforeCount = planState.placements.length;
  runPlanChunk(planState, PLAN_CHUNK_SIZE);
  logNewPlacements(planState, beforeCount);
  savePlanRunProgress(planState);
  render();

  if (planState.status === 'running') {
    setTimeout(runPlanLoop, 0);
  } else {
    clearPlanRunProgress(); // finished (or cancelled) -- nothing left to resume
    announcePlanStatus(planState.status === 'cancelled'
      ? `Cancelled at ${planState.doneCount} of ${planState.totalCount} cubes.`
      : `Mosaic plan finished. ${planState.doneCount} of ${planState.totalCount} cubes worked out${planState.errors.length > 0 ? `, ${planState.errors.length} with issues` : ''}.`);
  }
}

function handleCancelPlan() {
  const planState = appState.patternPlanState;
  if (!planState || planState.status !== 'running') return;
  planState.status = 'cancelled';
  // leave solveQueue/poolQueue as-is in case the person wants to see
  // exactly how far it got; runPlanLoop's next scheduled tick (if any)
  // will see the 'cancelled' status and stop without processing more.
}

// Builds the downloadable solve-log export: one normalized 54-char
// state string per real solve, plain text, one per line -- this is the
// file you'd paste into pattern mode's "Input color pattern" starting-
// state box for a FUTURE mosaic project.
function exportSolveLogText() {
  return appState.solveLog.map(entry => entry.resultStr).join('\n') + (appState.solveLog.length ? '\n' : '');
}

function handleExportSolveLog() {
  const text = exportSolveLogText();
  if (!text.trim()) return;
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cube_states_${new Date().toISOString().slice(0, 10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// Saves the current solveLog into localStorage under a user-chosen
// name, making it selectable from pattern mode's "Use a previously
// saved mosaic's pattern" picker for a future mosaic.
function handleSaveAsNamedExport() {
  if (appState.solveLog.length === 0) return;
  const defaultName = `Mosaic ${new Date().toLocaleDateString()}`;
  const name = (typeof prompt === 'function' ? prompt('Name this saved export:', defaultName) : defaultName);
  if (!name) return;
  const finalName = saveCurrentLogAsExport(name);
  if (finalName !== name && typeof alert === 'function') {
    alert(`"${name}" was already used, so this was saved as "${finalName}" instead.`);
  }
  render();
}

// =====================================================================
// 3D cube viewer: an animated, turnable Three.js cube that visually
// demonstrates a placement's exact turn sequence, one move at a time.
//
// The geometry mapping (which face/row/col of a 54-char string colors
// which physical sticker) and the rotation matrix for each of the 6
// face moves were derived AND VERIFIED against the real cubejs
// library before writing this: for every face (U/R/F/D/L/B) in all
// three variants (clockwise, counterclockwise, double-turn), the
// hypothesized rotation was applied to a known cube state and checked
// to reproduce cubejs's own real move() output across all 26 outer
// cubelets with zero mismatches. See development notes -- this is not
// a guess, it's checked against the same solver the rest of the tool
// trusts.
// =====================================================================

// Maps (face, row, col) -> {x,y,z} of the outward-facing sticker on
// that small cube, in a coordinate system where each axis runs -1..1.
// Verified against CORNER_POSITIONS/EDGE_POSITIONS (the tool's own
// known-correct piece tables) for every corner, edge, and center.
const CUBE3D_FACE_FNS = {
  U: (r, c) => ({ x: c - 1, y: 1, z: r - 1 }),
  D: (r, c) => ({ x: c - 1, y: -1, z: 1 - r }),
  F: (r, c) => ({ x: c - 1, y: 1 - r, z: 1 }),
  B: (r, c) => ({ x: 1 - c, y: 1 - r, z: -1 }),
  R: (r, c) => ({ x: 1, y: 1 - r, z: 1 - c }),
  L: (r, c) => ({ x: -1, y: 1 - r, z: c - 1 }),
};
const CUBE3D_FACE_DIR = { U: {x:0,y:1,z:0}, D: {x:0,y:-1,z:0}, F: {x:0,y:0,z:1}, B: {x:0,y:0,z:-1}, R: {x:1,y:0,z:0}, L: {x:-1,y:0,z:0} };
const CUBE3D_DIR_TO_FACE = {};
Object.entries(CUBE3D_FACE_DIR).forEach(([f, d]) => { CUBE3D_DIR_TO_FACE[`${d.x},${d.y},${d.z}`] = f; });

// Clockwise (viewed from outside that face) rotation matrices, one
// quarter-turn, around the relevant fixed axis. Verified empirically
// against cubejs for all 6 faces; ', 2 variants are this applied 3x/2x.
const CUBE3D_ROTATIONS = {
  R: (p) => ({ x: p.x, y: p.z, z: -p.y }),
  L: (p) => ({ x: p.x, y: -p.z, z: p.y }),
  U: (p) => ({ x: -p.z, y: p.y, z: p.x }),
  D: (p) => ({ x: p.z, y: p.y, z: -p.x }),
  F: (p) => ({ x: p.y, y: -p.x, z: p.z }),
  B: (p) => ({ x: -p.y, y: p.x, z: p.z }),
};
// Each face's quarter-turn rotation, expressed as a THREE.js axis +
// angle (radians, right-hand rule) for the animated visual turn. These
// describe the SAME rotations as CUBE3D_ROTATIONS above (kept as a
// separate, simple lookup since Three.js animates via axis-angle
// rather than the explicit coordinate formulas used for state tracking).
const CUBE3D_AXIS_ANGLE = {
  R: { axis: { x: 1, y: 0, z: 0 }, angle: -Math.PI / 2 },
  L: { axis: { x: 1, y: 0, z: 0 }, angle: Math.PI / 2 },
  U: { axis: { x: 0, y: 1, z: 0 }, angle: -Math.PI / 2 },
  D: { axis: { x: 0, y: 1, z: 0 }, angle: Math.PI / 2 },
  F: { axis: { x: 0, y: 0, z: 1 }, angle: -Math.PI / 2 },
  B: { axis: { x: 0, y: 0, z: 1 }, angle: Math.PI / 2 },
};

const CUBE3D_PALETTE_HEX = {
  U: '#ffffff', R: '#ffd500', F: '#b71234', D: '#ff5800', L: '#0046ad', B: '#009b48',
};
const CUBE3D_INTERNAL_HEX = '#1a1a1a';

// Parses a move token like "R", "R'", "R2" into { face, turns } where
// turns is 1, 2, or 3 quarter-turns clockwise (so R' becomes 3 -- i.e.
// 3 clockwise quarter-turns is the same end state as 1 counterclockwise).
function cube3dParseMove(token) {
  const face = token[0];
  if (token.length === 1) return { face, turns: 1 };
  if (token[1] === '2') return { face, turns: 2 };
  if (token[1] === "'") return { face, turns: 3 };
  return { face, turns: 1 };
}

// Builds the initial per-cubelet model from a 54-char state string:
// one entry per of the 26 outer small cubes, each with its integer
// position and a map of which color sits on each of its outward faces.
function cube3dBuildModel(str) {
  const stickerMap = {}; // "x,y,z,face" -> color char
  FACE_ORDER.forEach((face, fi) => {
    const block = str.slice(fi * 9, fi * 9 + 9);
    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const ch = block[r * 3 + c];
        const { x, y, z } = CUBE3D_FACE_FNS[face](r, c);
        stickerMap[`${x},${y},${z},${face}`] = ch;
      }
    }
  });
  const cubelets = [];
  for (let x = -1; x <= 1; x++) {
    for (let y = -1; y <= 1; y++) {
      for (let z = -1; z <= 1; z++) {
        if (x === 0 && y === 0 && z === 0) continue; // hidden core, not rendered
        const colors = {}; // face letter (U/R/F/D/L/B as a DIRECTION, not a string-source) -> color char
        for (const face of FACE_ORDER) {
          const key = `${x},${y},${z},${face}`;
          if (key in stickerMap) colors[face] = stickerMap[key];
        }
        cubelets.push({ x, y, z, colors });
      }
    }
  }
  return cubelets;
}

// Applies one quarter-turn (clockwise, viewed from outside) of the
// given face to the logical cubelet model IN PLACE: cubelets in that
// layer get new positions AND their colors map gets re-keyed to the
// new outward directions (since a sticker that faced "Up" before a
// turn may face "Front" after it).
function cube3dApplyQuarterTurn(cubelets, face) {
  const axis = (face === 'R' || face === 'L') ? 'x' : (face === 'U' || face === 'D') ? 'y' : 'z';
  const layerVal = (face === 'R' || face === 'U' || face === 'F') ? 1 : -1;
  const rotFn = CUBE3D_ROTATIONS[face];
  for (const cubelet of cubelets) {
    if (cubelet[axis] !== layerVal) continue;
    const newPos = rotFn({ x: cubelet.x, y: cubelet.y, z: cubelet.z });
    const newColors = {};
    for (const [dirFace, ch] of Object.entries(cubelet.colors)) {
      const dir = CUBE3D_FACE_DIR[dirFace];
      const newDir = rotFn(dir);
      const newDirFace = CUBE3D_DIR_TO_FACE[`${newDir.x},${newDir.y},${newDir.z}`];
      newColors[newDirFace] = ch;
    }
    cubelet.x = newPos.x; cubelet.y = newPos.y; cubelet.z = newPos.z;
    cubelet.colors = newColors;
  }
}

// One CubeViewer instance owns its own Three.js scene/renderer/camera
// and the full move sequence's playback state. Created fresh each
// time the modal opens (and disposed on close) rather than kept alive
// globally, since only one can be open at a time and disposing avoids
// any WebGL context leaks across many opens during a long session.
function createCubeViewer(canvasContainer, startStr, moveString) {
  const moves = moveString.trim() === '' || moveString.includes('already matches')
    ? []
    : moveString.trim().split(/\s+/);

  const width = canvasContainer.clientWidth || 320;
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(width, width);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  canvasContainer.innerHTML = '';
  canvasContainer.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 100);
  camera.position.set(4.2, 3.6, 5.2);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
  dirLight.position.set(5, 8, 6);
  scene.add(dirLight);

  let cubelets = cube3dBuildModel(startStr);
  const cubeletGroup = new THREE.Group();
  scene.add(cubeletGroup);
  const meshByCubelet = new Map(); // cubelet object -> THREE.Mesh

  const CELL = 1.0; // each small cube's edge length in scene units
  const GAP = 0.05; // visual gap between cubelets

  function colorForDir(cubelet, dirFace) {
    const ch = cubelet.colors[dirFace];
    if (!ch) return CUBE3D_INTERNAL_HEX;
    // ch is a cubejs LETTER (U/R/F/D/L/B); map it to its mosaic color hex
    return CUBE3D_PALETTE_HEX[ch] || CUBE3D_INTERNAL_HEX;
  }

  function buildCubeletMesh(cubelet) {
    const geo = new THREE.BoxGeometry(CELL - GAP, CELL - GAP, CELL - GAP);
    // BoxGeometry face order: +x, -x, +y, -y, +z, -z
    const dirOrder = ['R', 'L', 'U', 'D', 'F', 'B'];
    const materials = dirOrder.map(dirFace => new THREE.MeshLambertMaterial({ color: colorForDir(cubelet, dirFace) }));
    const mesh = new THREE.Mesh(geo, materials);
    mesh.position.set(cubelet.x * CELL, cubelet.y * CELL, cubelet.z * CELL);
    return mesh;
  }

  function rebuildAllMeshes() {
    cubeletGroup.clear();
    meshByCubelet.clear();
    for (const cubelet of cubelets) {
      const mesh = buildCubeletMesh(cubelet);
      cubeletGroup.add(mesh);
      meshByCubelet.set(cubelet, mesh);
    }
  }
  rebuildAllMeshes();

  function render() { renderer.render(scene, camera); }
  render();

  // --- orbit-style drag rotation (simple, no external controls lib) ---
  let dragging = false, lastX = 0, lastY = 0;
  let viewRotX = -0.35, viewRotY = 0.6;
  function applyViewRotation() {
    cubeletGroup.rotation.set(0, 0, 0);
    cubeletGroup.rotateY(viewRotY);
    cubeletGroup.rotateX(viewRotX);
  }
  applyViewRotation();
  render();
  function onPointerDown(e) { dragging = true; lastX = (e.touches ? e.touches[0].clientX : e.clientX); lastY = (e.touches ? e.touches[0].clientY : e.clientY); }
  function onPointerMove(e) {
    if (!dragging) return;
    const x = (e.touches ? e.touches[0].clientX : e.clientX);
    const y = (e.touches ? e.touches[0].clientY : e.clientY);
    viewRotY += (x - lastX) * 0.01;
    viewRotX += (y - lastY) * 0.01;
    viewRotX = Math.max(-1.4, Math.min(1.4, viewRotX));
    lastX = x; lastY = y;
    applyViewRotation();
    render();
    e.preventDefault();
  }
  function onPointerUp() { dragging = false; }
  renderer.domElement.addEventListener('mousedown', onPointerDown);
  renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: true });
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('touchmove', onPointerMove, { passive: false });
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchend', onPointerUp);

  // --- move playback ---
  let currentStep = 0; // number of moves fully applied so far (0..moves.length)
  let animating = false;

  // Animates ONE quarter-turn visually (the layer's meshes spin smoothly
  // from 0 to the target angle), then bakes the rotation into the
  // logical model and rebuilds meshes at their new resting transforms --
  // baking after each quarter turn (rather than accumulating raw mesh
  // transforms) keeps subsequent layer-selection and future animations
  // exact, since cube3dApplyQuarterTurn is the same verified logic used
  // for state tracking, not an approximation.
  function animateQuarterTurn(face, clockwise, onDone) {
    const axis = (face === 'R' || face === 'L') ? 'x' : (face === 'U' || face === 'D') ? 'y' : 'z';
    const layerVal = (face === 'R' || face === 'U' || face === 'F') ? 1 : -1;
    const layerCubelets = cubelets.filter(c => c[axis] === layerVal);
    const pivot = new THREE.Group();
    scene.add(pivot); // NOTE: pivot added to scene directly, matching cubeletGroup's world transform via copy below
    pivot.quaternion.copy(cubeletGroup.quaternion);
    pivot.position.copy(cubeletGroup.position);
    const meshes = layerCubelets.map(c => meshByCubelet.get(c));
    meshes.forEach(m => { cubeletGroup.remove(m); pivot.add(m); });

    const { axis: rotAxis } = CUBE3D_AXIS_ANGLE[face];
    const baseAngle = CUBE3D_AXIS_ANGLE[face].angle;
    const targetAngle = clockwise ? baseAngle : -baseAngle;
    const axisVec = new THREE.Vector3(rotAxis.x, rotAxis.y, rotAxis.z);

    const duration = 260; // ms per quarter turn -- quick enough not to feel sluggish across many moves, slow enough to actually see
    const start = performance.now();
    function tick() {
      const t = Math.min(1, (performance.now() - start) / duration);
      const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad
      pivot.setRotationFromAxisAngle(axisVec, targetAngle * eased);
      render();
      if (t < 1) {
        requestAnimationFrame(tick);
      } else {
        meshes.forEach(m => { pivot.remove(m); cubeletGroup.add(m); });
        scene.remove(pivot);
        for (let i = 0; i < (clockwise ? 1 : 3); i++) cube3dApplyQuarterTurn(cubelets, face);
        rebuildAllMeshes();
        render();
        onDone();
      }
    }
    requestAnimationFrame(tick);
  }

  // Plays move index `idx` (0-based into `moves`) forward, animating
  // however many quarter-turns it represents (1 for a plain/[''], 2 for
  // a double-turn, animated as two consecutive quarter turns so the
  // direction is still visually clear).
  function playMoveForward(idx, onDone) {
    if (idx < 0 || idx >= moves.length) { onDone(); return; }
    const { face, turns } = cube3dParseMove(moves[idx]);
    const clockwise = turns !== 3; // 3 clockwise quarters == 1 counterclockwise, but we still animate forward as CW steps for turns 1 and 2
    const quarterTurns = turns === 2 ? 2 : 1;
    let done = 0;
    function step() {
      if (done >= quarterTurns) { onDone(); return; }
      animateQuarterTurn(face, clockwise, () => { done++; step(); });
    }
    step();
  }

  return {
    get currentStep() { return currentStep; },
    get totalSteps() { return moves.length; },
    get isAnimating() { return animating; },
    moves,
    next(callback) {
      if (animating || currentStep >= moves.length) return;
      animating = true;
      playMoveForward(currentStep, () => {
        currentStep++;
        animating = false;
        if (callback) callback();
      });
    },
    // Re-derives the model from scratch up to the new step index rather
    // than animating backward (animating a turn in reverse is just as
    // complex as forward and "instant jump" is perfectly fine for
    // stepping back -- you're reviewing a move you already saw).
    jumpTo(stepIndex, callback) {
      if (animating) return;
      const clamped = Math.max(0, Math.min(moves.length, stepIndex));
      cubelets = cube3dBuildModel(startStr);
      for (let i = 0; i < clamped; i++) {
        const { face, turns } = cube3dParseMove(moves[i]);
        for (let t = 0; t < turns; t++) cube3dApplyQuarterTurn(cubelets, face);
      }
      currentStep = clamped;
      rebuildAllMeshes();
      render();
      if (callback) callback();
    },
    dispose() {
      renderer.domElement.removeEventListener('mousedown', onPointerDown);
      renderer.domElement.removeEventListener('touchstart', onPointerDown);
      window.removeEventListener('mousemove', onPointerMove);
      window.removeEventListener('touchmove', onPointerMove);
      window.removeEventListener('mouseup', onPointerUp);
      window.removeEventListener('touchend', onPointerUp);
      renderer.dispose();
    },
  };
}

// --- Modal UI: opens a CubeViewer for one placement's move sequence ---
let activeCubeViewer = null;
let activeViewerAutoplayTimer = null;
let cubeViewerTriggerEl = null; // element to restore focus to when the modal closes
let cubeViewerKeydownHandler = null; // bound per-open so it can be removed again on close

function closeCubeViewer() {
  if (activeViewerAutoplayTimer) { clearTimeout(activeViewerAutoplayTimer); activeViewerAutoplayTimer = null; }
  if (activeCubeViewer) { activeCubeViewer.dispose(); activeCubeViewer = null; }
  const overlay = document.getElementById('cubeViewerOverlay');
  if (overlay) overlay.remove();
  if (cubeViewerKeydownHandler) { document.removeEventListener('keydown', cubeViewerKeydownHandler); cubeViewerKeydownHandler = null; }
  if (cubeViewerTriggerEl && typeof cubeViewerTriggerEl.focus === 'function') { cubeViewerTriggerEl.focus(); }
  cubeViewerTriggerEl = null;
}

// Returns the ordered list of placement indices that have actual
// moves to animate (skipping free matches, which have nothing to
// play) -- this is what "previous/next cube" navigation steps through,
// and what the progress count ("cube 4 of 212 needing turns") is based
// on, since that's a more useful number to track while physically
// working through a stack of cubes than the total placement count
// (which includes free matches you never visit in this viewer at all).
function cubeViewerNavigableIndices(planState) {
  const indices = [];
  planState.placements.forEach((p, i) => { if (p.type === 'solve') indices.push(i); });
  return indices;
}

function openCubeViewer(placementIndex) {
  if (typeof THREE === 'undefined') {
    alert("The 3D viewer couldn't load (this needs an internet connection to fetch the Three.js library). The text instructions above still work fine without it.");
    return;
  }
  const planState = appState.patternPlanState;
  const placement = planState.placements[placementIndex];
  const width = planState.mosaicWidth;
  const pos = gridPositionForLine(placement.targetLineNum, width);
  const posLabel = pos ? `row ${pos.row}, col ${pos.col}` : `line ${placement.targetLineNum}`;
  const minimapHtml = buildCubeViewerMinimapHtml(planState.targetsInput, width, placement.targetLineNum);

  const navigable = cubeViewerNavigableIndices(planState);
  const navPos = navigable.indexOf(placementIndex); // this cube's position among "cubes needing turns", 0-based
  const placedSoFar = navigable.slice(0, navPos + 1).filter(i => planState.placements[i].placed).length;

  closeCubeViewer(); // only one at a time
  cubeViewerTriggerEl = document.activeElement; // remember focus to restore it when this closes
  const overlay = document.createElement('div');
  overlay.className = 'cube-viewer-overlay';
  overlay.id = 'cubeViewerOverlay';
  overlay.innerHTML = `
    <div class="cube-viewer-modal" role="dialog" aria-modal="true" aria-labelledby="cubeViewerTitle" tabindex="-1">
      <div class="cube-viewer-header">
        <div>
          <h3 id="cubeViewerTitle">${placement.mosaicPattern} &mdash; show ${FACE_FULL_NAMES[placement.face]} face</h3>
          <div style="font-size:0.72rem; color:var(--text-dim); margin-top:2px;">Target ${posLabel}</div>
        </div>
        <button class="cube-viewer-close" id="cubeViewerCloseBtn" aria-label="Close 3D viewer">&times;</button>
      </div>
      ${minimapHtml}
      <div style="padding:0 16px 10px;">
        <div style="display:flex; justify-content:space-between; font-size:0.72rem; color:var(--text-dim); margin-bottom:4px;">
          <span>Cube ${navPos + 1} of ${navigable.length} needing turns</span>
          <span>${placedSoFar} marked placed so far</span>
        </div>
        <div style="background:#111; border-radius:6px; height:6px; overflow:hidden;">
          <div style="background:var(--accent); height:100%; width:${(100 * (navPos + 1) / Math.max(1, navigable.length)).toFixed(1)}%;"></div>
        </div>
      </div>
      <div class="cube-viewer-canvas-wrap" id="cubeViewerCanvasWrap"></div>
      <div class="cube-viewer-step-label" id="cubeViewerStepLabel"></div>
      <div class="cube-viewer-moves-strip" id="cubeViewerMovesStrip" tabindex="0" role="group" aria-label="Full move sequence, scrollable"></div>
      <div class="cube-viewer-controls">
        <button id="cubeViewerPrevBtn">&larr; Prev</button>
        <button id="cubeViewerPlayBtn" class="play-btn">Play</button>
        <button id="cubeViewerNextBtn">Next &rarr;</button>
      </div>
      <div class="cube-viewer-controls" style="padding-top:0;">
        <button id="cubeViewerPrevCubeBtn" ${navPos <= 0 ? 'disabled' : ''}>&larr; Prev cube</button>
        <button id="cubeViewerMarkPlacedBtn">${placement.placed ? '✓ Placed' : 'Mark placed'}</button>
        <button id="cubeViewerNextCubeBtn" ${navPos >= navigable.length - 1 ? 'disabled' : ''}>Next cube &rarr;</button>
      </div>
      <div class="cube-viewer-hint">Drag the cube to rotate your view.</div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.onclick = (e) => { if (e.target === overlay) closeCubeViewer(); };
  document.getElementById('cubeViewerCloseBtn').onclick = closeCubeViewer;
  document.getElementById('cubeViewerPrevCubeBtn').onclick = () => { if (navPos > 0) openCubeViewer(navigable[navPos - 1]); };
  document.getElementById('cubeViewerNextCubeBtn').onclick = () => { if (navPos < navigable.length - 1) openCubeViewer(navigable[navPos + 1]); };
  document.getElementById('cubeViewerMarkPlacedBtn').onclick = () => {
    placement.placed = !placement.placed;
    if (planState.status === 'done') savePlanRunProgress(planState);
    renderPlanResult();
    openCubeViewer(placementIndex); // re-render the modal in place to reflect the new placed state/progress
  };

  // Keyboard accessibility: Escape closes the dialog, and Tab/Shift+Tab
  // cycle (trap) focus among the dialog's own focusable controls rather
  // than leaking out to the page behind the overlay.
  const dialogEl = overlay.querySelector('.cube-viewer-modal');
  cubeViewerKeydownHandler = (e) => {
    if (e.key === 'Escape') {
      e.preventDefault();
      closeCubeViewer();
      return;
    }
    if (e.key === 'Tab' && dialogEl) {
      const focusable = Array.from(dialogEl.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'))
        .filter(el => !el.disabled && el.offsetParent !== null);
      if (focusable.length === 0) return;
      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault();
        last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault();
        first.focus();
      }
    }
  };
  document.addEventListener('keydown', cubeViewerKeydownHandler);
  if (dialogEl) dialogEl.focus(); // move focus into the dialog so screen readers announce it and Tab starts inside

  const canvasWrap = document.getElementById('cubeViewerCanvasWrap');
  try {
    activeCubeViewer = createCubeViewer(canvasWrap, placement.startStr, placement.moves);
  } catch (e) {
    closeCubeViewer();
    alert("Couldn't start the 3D viewer on this device (" + e.message + "). The text instructions above still work fine.");
    return;
  }

  function updateStepUI() {
    const v = activeCubeViewer;
    const label = document.getElementById('cubeViewerStepLabel');
    if (label) {
      if (v.totalSteps === 0) {
        label.innerHTML = 'This cube is already correct &mdash; no moves to play.';
      } else if (v.currentStep >= v.totalSteps) {
        label.innerHTML = `<strong style="color:var(--success); font-size:1.3rem;">Done</strong> &mdash; all ${v.totalSteps} moves complete`;
      } else {
        const nextMove = v.moves[v.currentStep];
        label.innerHTML = `Turn <strong style="font-size:1.5rem; font-family:'SF Mono',Monaco,monospace;">${nextMove}</strong> next &nbsp;<span style="color:var(--text-dim);">(move ${v.currentStep + 1} of ${v.totalSteps})</span>`;
      }
    }
    const strip = document.getElementById('cubeViewerMovesStrip');
    if (strip) {
      strip.innerHTML = v.moves.map((m, i) => `<span class="cube-viewer-move-chip ${i === v.currentStep ? 'current' : ''} ${i < v.currentStep ? 'done' : ''}">${m}</span>`).join('');
      const currentChip = strip.querySelector('.current');
      if (currentChip && typeof currentChip.scrollIntoView === 'function') {
        currentChip.scrollIntoView({ block: 'nearest', inline: 'center' });
      }
    }
    const prevBtn = document.getElementById('cubeViewerPrevBtn');
    const nextBtn = document.getElementById('cubeViewerNextBtn');
    const playBtn = document.getElementById('cubeViewerPlayBtn');
    if (prevBtn) prevBtn.disabled = v.currentStep === 0 || v.isAnimating;
    if (nextBtn) nextBtn.disabled = v.currentStep >= v.totalSteps || v.isAnimating;
    if (playBtn) playBtn.disabled = v.totalSteps === 0;
  }
  updateStepUI();

  document.getElementById('cubeViewerPrevBtn').onclick = () => {
    if (activeViewerAutoplayTimer) { clearTimeout(activeViewerAutoplayTimer); activeViewerAutoplayTimer = null; document.getElementById('cubeViewerPlayBtn').textContent = 'Play'; }
    activeCubeViewer.jumpTo(activeCubeViewer.currentStep - 1, updateStepUI);
  };
  document.getElementById('cubeViewerNextBtn').onclick = () => {
    activeCubeViewer.next(updateStepUI);
  };
  document.getElementById('cubeViewerPlayBtn').onclick = () => {
    const btn = document.getElementById('cubeViewerPlayBtn');
    if (activeViewerAutoplayTimer) {
      clearTimeout(activeViewerAutoplayTimer);
      activeViewerAutoplayTimer = null;
      btn.textContent = 'Play';
      return;
    }
    btn.textContent = 'Pause';
    function tick() {
      if (!activeCubeViewer || activeCubeViewer.currentStep >= activeCubeViewer.totalSteps) {
        activeViewerAutoplayTimer = null;
        btn.textContent = 'Play';
        return;
      }
      activeCubeViewer.next(() => {
        updateStepUI();
        if (activeCubeViewer.currentStep < activeCubeViewer.totalSteps) {
          activeViewerAutoplayTimer = setTimeout(tick, 220);
        } else {
          activeViewerAutoplayTimer = null;
          btn.textContent = 'Play';
        }
      });
    }
    tick();
  };
}

// =====================================================================
// Init
// =====================================================================

window.addEventListener('load', () => {
  setTimeout(() => {
    try {
      Cube.initSolver();
      appState.solverReady = true;
    } catch (e) {
      document.getElementById('app').innerHTML = `<div class="loading-msg">Failed to load solver: ${e.message}</div>`;
      return;
    }
    render();
  }, 50);
});
</script>
</body>
</html>
